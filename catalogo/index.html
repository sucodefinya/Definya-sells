<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Definya</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:#e2e8f0;
    overflow-x:hidden;
}

/* 🔴 FUNDO GLOW */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,50,0,0.15), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,0,0,0.08), transparent 60%);
    bottom:-200px;
    right:-200px;
    z-index:-2;
}

/* ANIMAÇÃO */
.fade-in{
    opacity:0;
    transform:translateY(20px);
    animation:fadeIn 0.8s ease forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* TOPO */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.back{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    text-decoration:none;
    border-radius:10px;
    box-shadow:0 0 8px rgba(255,0,0,0.4);
    transition:0.2s;
}

.back:hover{
    background:#ff2a2a;
    color:#000;
}

/* LOGO */
.logo{
    display:block;
    margin:20px auto 30px auto;
    max-width:360px;
    width:100%;
    filter: drop-shadow(0 0 15px rgba(255,0,0,0.5));
}

/* IMAGEM DOS CARDS */
.card-img{
    width:100%;
    max-height:120px;
    object-fit:contain;
    margin-bottom:10px;
    filter: drop-shadow(0 0 10px rgba(255,0,0,0.4));
}

/* CARDS */
.card{
    background:#0b1220;
    padding:20px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.25s;
}

.card:hover{
    transform:scale(1.04);
    border-color:#ff2a2a;
    box-shadow:0 0 20px rgba(255,0,0,0.3);
}

a{
    text-decoration:none;
    color:inherit;
}

/* BOTÃO */
.btn{
    display:block;
    margin-top:10px;
    padding:12px;
    text-align:center;
    border-radius:10px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    box-shadow:0 0 10px rgba(255,0,0,0.4);
    transition:0.2s;
}

.btn:hover{
    background:#ff2a2a;
    color:#000;
}

/* TEXTO */
.sub{
    color:#94a3b8;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container fade-in">

    <!-- TOPO -->
    <div class="topbar">
        <a href="/index.html" class="back">⬅ Voltar</a>
    </div>

    <!-- LOGO -->
    <img src="InShot_20260415_232237061.png" class="logo fade-in">

    <!-- UPADORES -->
    <div class="card fade-in" style="animation-delay:0.2s;">
        <img src="InShot_20260415_233141446.png" class="card-img">
        <p class="sub">Serviços de melhoria de conta, skills e progressão.</p>
        <a class="btn" href="skill/index.html">Acessar</a>
    </div>

    <!-- CONTAS -->
    <div class="card fade-in" style="animation-delay:0.4s;">
        <img src="InShot_20260415_232954727.png" class="card-img">
        <a class="btn" href="dashboard/index.html">Acessar</a>
    </div>

    <!-- ITENS -->
    <div class="card fade-in" style="animation-delay:0.6s;">
        <img src="InShot_20260415_233237975.png" class="card-img">
        <p class="sub">Encontre os itens que você procura.</p>
        <a class="btn" href="itens/index.html">Acessar</a>
    </div>

</div>

</body>
            </html>
