<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Definya</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:#e2e8f0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#00ffff;
    text-shadow:0 0 10px rgba(0,255,255,0.3);
}

.card{
    background:#0b1220;
    padding:20px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
    border-color:#00ffff;
}

a{
    text-decoration:none;
    color:inherit;
}

.btn{
    display:block;
    margin-top:10px;
    padding:12px;
    text-align:center;
    border-radius:10px;
    border:1px solid #00ffff;
    color:#00ffff;
    transition:0.2s;
}

.btn:hover{
    background:#00ffff;
    color:#000;
}

.sub{
    color:#94a3b8;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🏪 Catálogo Definya</h1>

    <!-- UPADORES -->
    <div class="card">
        <h2>⚡ Upadores e Treinadores</h2>
        <p class="sub">Serviços de melhoria de conta, skills e progressão.</p>
        <a class="btn" href="skill/index.html">Acessar</a>
    </div>

    <!-- CONTAS -->
    <div class="card">
        <h2>👤 Contas</h2>
        <p class="sub">Contas prontas, raras e modificadas.</p>
        <a class="btn" href="dashboard/index.html">Acessar</a>
    </div>

    <!-- ITENS -->
    <div class="card">
        <h2>📦 Itens</h2>
        <p class="sub">Skins, bônus, recursos e itens exclusivos.</p>
        <a class="btn" href="itens/index.html">Acessar</a>
    </div>

</div>

</body>
</html>
