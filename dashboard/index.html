<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* 🌌 glow leve */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(0,255,255,0.06), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-3;
}

/* 💜 glow roxo */
body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(160,0,255,0.10), transparent 60%);
    bottom:-200px;
    right:-200px;
    z-index:-3;
}

/* 💜 partículas roxas */
.particle{
    position:fixed;
    width:3px;
    height:3px;
    background:#a855f7;
    box-shadow:0 0 8px #a855f7;
    border-radius:50%;
    opacity:0.6;
    animation: floatUp linear infinite;
    z-index:-2;
}

@keyframes floatUp{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#00ffff;
    font-size:22px;
}

/* botão voltar */
.back-btn{
    padding:8px 14px;
    border:1px solid #00ffff;
    color:#00ffff;
    text-decoration:none;
    border-radius:10px;
}

/* títulos */
.section-title{
    margin-top:30px;
    text-align:center;
    color:#ff4d00;
    text-shadow:0 0 6px rgba(255,80,0,0.3);
}

/* CARD + ANIMAÇÃO */
.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    opacity:0;
    transform:translateY(20px);
    animation: fadeIn 0.5s forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

/* botão comprar */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #00ff88;
    color:#00ff88;
    border-radius:10px;
    text-decoration:none;
    transition:0.2s;
}

.buy-btn:hover{
    background:#00ff88;
    color:#000;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📦 CATÁLOGO NEON</h1>
        <a class="back-btn" href="/">Home</a>
    </div>

    <h2 class="section-title">🔥 MAIS PROCURADOS</h2>
    <div id="destaques"></div>

    <h2 class="section-title">📦 TODOS OS PRODUTOS</h2>
    <div id="todos"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

/* 💜 partículas roxas */
function createParticles(){
    for(let i=0;i<25;i++){
        let p = document.createElement("div");
        p.classList.add("particle");

        p.style.left = Math.random()*100 + "vw";
        p.style.animationDuration = (5 + Math.random()*6) + "s";
        p.style.opacity = Math.random()*0.5 + 0.2;
        p.style.width = p.style.height = (2 + Math.random()*3) + "px";

        document.body.appendChild(p);
    }
}
createParticles();

/* card */
function renderCard(item, index){

    const whatsapp = item.whatsapp
        ? `https://wa.me/${item.whatsapp}?text=${encodeURIComponent("Olá! Tenho interesse no produto: " + item.nome)}`
        : null;

    return `
        <div class="card" style="animation-delay:${index * 0.05}s">
            <h3 style="color:#00ffff">${item.nome}</h3>

            ${item.imagem ? `<img src="${item.imagem}">` : ""}

            <p>${item.descricao}</p>

            <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>

            ${whatsapp ? `
                <a class="buy-btn" href="${whatsapp}" target="_blank">
                    🛒 Comprar
                </a>
            ` : ""}
        </div>
    `;
}

async function carregar(){

    // 🔥 destaques
    const d = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(5);

    document.getElementById("destaques").innerHTML =
        d.data?.map(renderCard).join("") || "<p>Nenhum destaque</p>";

    // 📦 todos (SEM duplicar)
    const t = await client
        .from("produtos")
        .select("*")
        .eq("destaque", false) // 🔥 remove duplicação
        .order("id", { ascending:false });

    document.getElementById("todos").innerHTML =
        t.data?.map(renderCard).join("") || "<p>Sem produtos</p>";
}

carregar();
</script>

</body>
</html>
