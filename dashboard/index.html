<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* glow leve */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(0,255,255,0.06), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-2;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#00ffff;
    font-size:22px;
}

.back-btn{
    padding:8px 14px;
    border:1px solid #00ffff;
    color:#00ffff;
    text-decoration:none;
    border-radius:10px;
}

.section-title{
    margin-top:25px;
    text-align:center;
    color:#ff4d00;
}

/* card */
.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

/* botão comprar */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #00ff88;
    color:#00ff88;
    border-radius:10px;
    text-decoration:none;
}

.buy-btn:hover{
    background:#00ff88;
    color:#000;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📦 CATÁLOGO</h1>
        <a class="back-btn" href="/">Home</a>
    </div>

    <h2 class="section-title">🔥 MAIS PROCURADOS</h2>
    <div id="destaques"></div>

    <h2 class="section-title">📦 TODOS OS PRODUTOS</h2>
    <div id="todos"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

function renderCard(item){
    const whatsapp = item.whatsapp
        ? `https://wa.me/${item.whatsapp}?text=${encodeURIComponent("Olá! Tenho interesse no produto: " + item.nome)}`
        : null;

    return `
        <div class="card">
            <h3 style="color:#00ffff">${item.nome}</h3>

            ${item.imagem ? `<img src="${item.imagem}">` : ""}

            <p>${item.descricao}</p>

            <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>

            ${whatsapp ? `
                <a class="buy-btn" href="${whatsapp}" target="_blank">
                    🛒 Comprar
                </a>
            ` : ""}
        </div>
    `;
}

async function carregar(){

    // 🔥 destaques
    const d = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(5);

    document.getElementById("destaques").innerHTML =
        d.data?.map(renderCard).join("") || "<p>Nenhum destaque</p>";

    // 📦 todos produtos
    const t = await client
        .from("produtos")
        .select("*")
        .order("id", { ascending:false });

    document.getElementById("todos").innerHTML =
        t.data?.map(renderCard).join("") || "<p>Sem produtos</p>";
}

carregar();
</script>

</body>
</html>
