<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<style>
:root{
    --main:#ff2a2a;
    --soft:rgba(255,0,0,0.3);
    --bg:#000;
    --card:#0a0a0f;
    --text:#e5e7eb;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* glow */
body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(255,40,0,0.15), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-3;
}

body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(255,0,0,0.1), transparent 60%);
    bottom:-200px;
    right:-200px;
    z-index:-3;
}

/* vento */
.wind{
    position:fixed;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        90deg,
        rgba(255,0,0,0.05) 0px,
        transparent 2px,
        transparent 6px
    );
    animation: windMove 6s linear infinite;
    z-index:-2;
}

@keyframes windMove{
    from{ transform:translateX(0); }
    to{ transform:translateX(-40px); }
}

/* partículas */
.particle{
    position:fixed;
    bottom:-10px;
    border-radius:50%;
    background:var(--main);
    box-shadow:0 0 12px var(--main);
    z-index:-1;
    animation: floatUp linear forwards;
}

@keyframes floatUp{
    from{ transform:translateY(0); }
    to{ transform:translateY(-120vh); }
}

/* layout */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:var(--main);
    text-shadow:0 0 12px var(--soft);
}

.section-title{
    text-align:center;
    margin-top:30px;
    color:var(--main);
    text-shadow:0 0 10px var(--soft);
}

/* card */
.card{
    background:var(--card);
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);

    opacity:0;
    transform:translateY(50px);
    transition:all 0.6s ease;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    border-color:var(--main);
    box-shadow:0 0 20px var(--soft);
    transform:translateY(-5px) scale(1.02);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

/* 💸 PREÇO COM IMAGEM */
.price{
    display:flex;
    align-items:center;
    gap:6px;
    color:#00ff88;
    font-weight:bold;
}

.price img{
    width:24px;
    height:24px;
    filter: drop-shadow(0 0 8px rgba(0,255,150,0.9));
}

/* botão */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid var(--main);
    color:var(--main);
    border-radius:10px;
    text-decoration:none;
    box-shadow:0 0 10px var(--soft);
    transition:0.2s;
}

.buy-btn:hover{
    background:var(--main);
    color:#000;
    box-shadow:0 0 20px var(--main);
}
</style>
</head>

<body>

<div class="wind"></div>

<div class="container">

    <div class="header">
        <h1>📦 CATÁLOGO</h1>
    </div>

    <h2 class="section-title">🔥 MAIS PROCURADOS</h2>
    <div id="destaques"></div>

    <h2 class="section-title">📦 TODOS OS PRODUTOS</h2>
    <div id="todos"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* FORMATAR NÚMERO */
function formatarNumero(num){
    if(!num) return "5599999999999";

    num = num.replace(/\D/g,"");

    if(!num.startsWith("55")){
        num = "55" + num;
    }

    return num;
}

/* partículas */
setInterval(() => {
    const p = document.createElement("div");
    p.classList.add("particle");

    let size = Math.random() * 4 + 1;

    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (6 + Math.random()*6) + "s";

    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 12000);

}, 250);

/* render */
function renderCard(item){

    const numero = formatarNumero(item.whatsapp);

    const whatsapp = `https://wa.me/${numero}?text=${encodeURIComponent("Olá! Tenho interesse no produto: " + item.nome)}`;

    return `
        <div class="card">
            <h3 style="color:#ff2a2a">${item.nome}</h3>

            ${item.imagem ? `<img src="${item.imagem}">` : ""}

            <p>${item.descricao}</p>

            <div class="price">
                <img src="/price.png">
                R$ ${parseFloat(item.preco).toFixed(2)}
            </div>

            <a class="buy-btn" href="${whatsapp}" target="_blank">
                🛒 Comprar
            </a>
        </div>
    `;
}

/* animação */
function observerSetup(){
    const cards = document.querySelectorAll(".card");

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                entry.target.classList.add("show");
            }
        });
    }, { threshold:0.15 });

    cards.forEach(card => observer.observe(card));
}

/* carregar */
async function carregar(){

    const d = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(5);

    document.getElementById("destaques").innerHTML =
        d.data?.map(renderCard).join("") || "<p>Nenhum destaque</p>";

    const t = await client
        .from("produtos")
        .select("*")
        .eq("destaque", false)
        .order("id", { ascending:false });

    document.getElementById("todos").innerHTML =
        t.data?.map(renderCard).join("") || "<p>Sem produtos</p>";

    observerSetup();
}

carregar();
</script>

</body>
</html>
