<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* 🌌 glow base */
body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(0,255,255,0.06), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-3;
}

body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(160,0,255,0.12), transparent 60%);
    bottom:-200px;
    right:-200px;
    z-index:-3;
}

/* 💜 PARTÍCULAS MELHORADAS */
.particle{
    position:fixed;
    border-radius:50%;
    background:#b026ff;
    box-shadow:0 0 10px #b026ff, 0 0 20px rgba(176,38,255,0.5);
    opacity:0.7;
    animation: floatUp linear infinite;
    z-index:-2;
}

@keyframes floatUp{
    0%{
        transform:translateY(110vh) translateX(0);
        opacity:0;
    }
    10%{ opacity:0.7; }
    50%{ transform:translateY(50vh) translateX(20px); }
    100%{
        transform:translateY(-10vh) translateX(-20px);
        opacity:0;
    }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#00ffff;
}

/* títulos */
.section-title{
    text-align:center;
    margin-top:30px;
    color:#ff4d00;
    text-shadow:0 0 8px rgba(255,80,0,0.3);
}

/* 🧊 CARD MAIS VIVO */
.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);

    opacity:0;
    transform:translateY(40px) scale(0.95);
    animation: cardIn 0.6s forwards;
}

@keyframes cardIn{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* leve “respiração” */
.card:hover{
    transform:translateY(-5px) scale(1.01);
    box-shadow:0 0 15px rgba(176,38,255,0.15);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

/* botão comprar */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #00ff88;
    color:#00ff88;
    border-radius:10px;
    text-decoration:none;
    transition:0.2s;
}

.buy-btn:hover{
    background:#00ff88;
    color:#000;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📦 CATÁLOGO NEON</h1>
    </div>

    <h2 class="section-title">🔥 MAIS PROCURADOS</h2>
    <div id="destaques"></div>

    <h2 class="section-title">📦 TODOS OS PRODUTOS</h2>
    <div id="todos"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

/* 💜 PARTÍCULAS AGORA FUNCIONANDO DE VERDADE */
function createParticles(){
    for(let i=0;i<35;i++){
        let p = document.createElement("div");
        p.classList.add("particle");

        let size = Math.random()*4 + 2;

        p.style.width = size + "px";
        p.style.height = size + "px";

        p.style.left = Math.random()*100 + "vw";

        p.style.animationDuration = (4 + Math.random()*6) + "s";
        p.style.animationDelay = Math.random()*5 + "s";

        document.body.appendChild(p);
    }
}
createParticles();

/* card */
function renderCard(item, index){

    const whatsapp = item.whatsapp
        ? `https://wa.me/${item.whatsapp}?text=${encodeURIComponent("Olá! Tenho interesse no produto: " + item.nome)}`
        : null;

    return `
        <div class="card" style="animation-delay:${index * 0.06}s">
            <h3 style="color:#00ffff">${item.nome}</h3>

            ${item.imagem ? `<img src="${item.imagem}">` : ""}

            <p>${item.descricao}</p>

            <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>

            ${whatsapp ? `
                <a class="buy-btn" href="${whatsapp}" target="_blank">
                    🛒 Comprar
                </a>
            ` : ""}
        </div>
    `;
}

async function carregar(){

    const d = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(5);

    document.getElementById("destaques").innerHTML =
        d.data?.map(renderCard).join("") || "<p>Nenhum destaque</p>";

    const t = await client
        .from("produtos")
        .select("*")
        .eq("destaque", false)
        .order("id", { ascending:false });

    document.getElementById("todos").innerHTML =
        t.data?.map(renderCard).join("") || "<p>Sem produtos</p>";
}

carregar();
</script>

</body>
</html>
