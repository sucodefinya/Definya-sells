<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Itens</title>

<style>
:root{
    --main:#ff2a2a;
    --bg:#05060a;
    --card:#0b1220;
    --soft:rgba(255,0,0,0.25);
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:#e2e8f0;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1220;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin:6px 0;
    background:#111827;
    border:none;
    color:#fff;
    border-radius:10px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.back{ background:var(--main); color:#000; }
.logout{ background:#ef4444; color:#fff; }

.add{
    width:100%;
    margin-top:15px;
    background:transparent;
    border:1px solid var(--main);
    color:var(--main);
    box-shadow:0 0 10px var(--soft);
    font-weight:bold;
}

.add:hover{
    background:var(--main);
    color:#000;
}

.card{
    background:var(--card);
    padding:12px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.05);
    position:relative;
}

.destaque{
    border:1px solid #ff3c00;
    box-shadow:0 0 15px rgba(255,60,0,0.5);
}

.badge{
    position:absolute;
    top:8px;
    right:8px;
    background:#ff3c00;
    color:#000;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
    font-weight:bold;
}

.item-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.destacarBtn{ background:#facc15; color:#000; }
.removerDestaqueBtn{ background:#6b7280; color:#fff; }
.delBtn{ background:#ef4444; color:#fff; }

#logs{
    margin-top:15px;
    background:#030303;
    padding:10px;
    font-family:monospace;
    font-size:12px;
    height:150px;
    overflow:auto;
    border-radius:10px;
    border:1px solid rgba(255,0,0,0.2);
}

.raridade{
    margin-top:5px;
    font-weight:bold;
}

.comum{color:#9ca3af;}
.incomum{color:#22c55e;}
.raro{color:#3b82f6;}
.epico{color:#a855f7;}
.lendario{color:#facc15;}
</style>
</head>

<body>

<div class="topbar">
    <h3>📦 Admin Itens</h3>
    <div>
        <button class="back" onclick="goAdmin()">Admin</button>
        <button class="logout" onclick="logout()">Sair</button>
    </div>
</div>

<div class="container">

<h3>➕ Adicionar Item</h3>

<input id="nome" placeholder="Nome do item">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="preco" placeholder="Preço">

<!-- 🔥 INPUT CORRIGIDO -->
<input id="whatsapp" placeholder="WhatsApp (somente números)" inputmode="numeric">

<select id="raridade">
<option value="">Escolher raridade</option>
<option value="comum">Comum</option>
<option value="incomum">Incomum</option>
<option value="raro">Raro</option>
<option value="epico">Épico</option>
<option value="lendario">Lendário</option>
</select>

<button class="add" onclick="publicar()">PUBLICAR ITEM</button>

<h3>📜 Logs</h3>
<div id="logs"></div>

<h3>📦 Itens</h3>
<div id="lista"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://dbqleycdrkdhxrozsmup.supabase.co",
"sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* 🔥 BLOQUEAR LETRA EM TEMPO REAL */
document.getElementById("whatsapp").addEventListener("input", (e)=>{
    e.target.value = e.target.value.replace(/\D/g,"");
});

/* FORMATAR */
function formatarNumero(num){
    if(!num) return "";
    num = num.replace(/\D/g,"");
    if(!num.startsWith("55")) num = "55"+num;
    return num;
}

/* LOG */
function log(msg){
    const el = document.getElementById("logs");
    const t = new Date().toLocaleTimeString();
    el.innerHTML += `[${t}] ${msg}<br>`;
    el.scrollTop = el.scrollHeight;
}

/* PUBLICAR */
async function publicar(){

    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const raridade = document.getElementById("raridade").value;
    let whatsapp = document.getElementById("whatsapp").value;

    /* 🔥 VALIDAÇÃO */
    if(!nome || !preco || !raridade){
        alert("Preenche tudo");
        return;
    }

    if(!whatsapp || whatsapp.length < 10){
        alert("Número inválido");
        return;
    }

    whatsapp = formatarNumero(whatsapp);

    log("📡 enviando...");

    const { error } = await client.from("itens").insert([{
        nome,
        descricao,
        preco,
        raridade,
        whatsapp: Number(whatsapp), // 🔥 garante número
        destaque:false
    }]);

    if(error){
        log("❌ erro: "+error.message);
        return;
    }

    log("✅ item publicado");

    document.getElementById("nome").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("whatsapp").value = "";

    carregar();
}

/* DESTAQUE */
async function toggleDestaque(id, atual){
    await client.from("itens")
    .update({ destaque: !atual })
    .eq("id", id);

    carregar();
}

/* CARREGAR */
async function carregar(){

    const { data } = await client
        .from("itens")
        .select("*")
        .order("id",{ascending:false});

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(p=>{
        lista.innerHTML += `
        <div class="card ${p.destaque ? "destaque" : ""}">
            ${p.destaque ? `<div class="badge">DESTAQUE</div>` : ""}

            <b>${p.nome}</b>
            <p>${p.descricao}</p>
            💰 ${p.preco}

            <div class="item-actions">
                <button onclick="toggleDestaque('${p.id}', ${p.destaque})">
                    ${p.destaque ? "❌ Tirar destaque" : "⭐ Destacar"}
                </button>

                <button class="delBtn" onclick="del('${p.id}')">
                    🗑 Excluir
                </button>
            </div>
        </div>
        `;
    });
}

/* DELETE */
async function del(id){
    await client.from("itens").delete().eq("id",id);
    carregar();
}

function goAdmin(){
    window.location.href="/admin";
}

async function logout(){
    await client.auth.signOut();
    window.location.href="/index.html";
}

carregar();
</script>

</body>
</html>
