<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Itens</title>

<style>
:root{
    --main:#ff2a2a;
    --bg:#05060a;
    --card:#0b1220;
    --soft:rgba(255,0,0,0.25);
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:#e2e8f0;
}

/* TOPO */
.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1220;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* INPUTS */
input, textarea, select{
    width:100%;
    padding:12px;
    margin:6px 0;
    background:#111827;
    border:none;
    color:#fff;
    border-radius:10px;
}

/* CHECKBOX CUSTOM */
.checkbox{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    cursor:pointer;
}

.checkbox input{
    width:18px;
    height:18px;
    accent-color:#ff2a2a;
}

/* BOTÕES */
button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.back{
    background:var(--main);
    color:#000;
}

.logout{
    background:#ef4444;
    color:#fff;
}

.add{
    width:100%;
    margin-top:15px;
    background:transparent;
    border:1px solid var(--main);
    color:var(--main);
    box-shadow:0 0 10px var(--soft);
    font-weight:bold;
}

.add:hover{
    background:var(--main);
    color:#000;
}

/* CARD */
.card{
    background:var(--card);
    padding:12px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.05);
    position:relative;
}

/* DESTAQUE VISUAL */
.destaque{
    border:1px solid #ff3c00;
    box-shadow:0 0 15px rgba(255,60,0,0.5);
}

.badge{
    position:absolute;
    top:8px;
    right:8px;
    background:#ff3c00;
    color:#000;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
    font-weight:bold;
}

/* LOG */
#logs{
    margin-top:15px;
    background:#030303;
    padding:10px;
    font-family:monospace;
    font-size:12px;
    height:150px;
    overflow:auto;
    border-radius:10px;
    border:1px solid rgba(255,0,0,0.2);
}

.delBtn{
    background:#ef4444;
    color:#fff;
    margin-top:10px;
}

.raridade{
    margin-top:5px;
    font-weight:bold;
}

.comum{color:#9ca3af;}
.incomum{color:#22c55e;}
.raro{color:#3b82f6;}
.epico{color:#a855f7;}
.lendario{color:#facc15;}
</style>
</head>

<body>

<div class="topbar">
    <h3>📦 Admin Itens</h3>
    <div>
        <button class="back" onclick="goAdmin()">Admin</button>
        <button class="logout" onclick="logout()">Sair</button>
    </div>
</div>

<div class="container">

<h3>➕ Adicionar Item</h3>

<input id="nome" placeholder="Nome do item">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="preco" placeholder="Preço">
<input id="whatsapp" placeholder="WhatsApp">

<select id="raridade">
<option value="">Escolher raridade</option>
<option value="comum">Comum</option>
<option value="incomum">Incomum</option>
<option value="raro">Raro</option>
<option value="epico">Épico</option>
<option value="lendario">Lendário</option>
</select>

<!-- 🔥 NOVO: DESTAQUE -->
<label class="checkbox">
    <input type="checkbox" id="destaque">
    <span>🔥 Destacar item</span>
</label>

<input type="file" id="imagemInput">

<div id="preview"></div>

<h3>👀 Preview</h3>
<div id="previewCard" class="card"></div>

<button class="add" onclick="publicar()">PUBLICAR ITEM</button>

<h3>📜 Logs</h3>
<div id="logs"></div>

<h3>📦 Itens</h3>
<div id="lista"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://dbqleycdrkdhxrozsmup.supabase.co",
"sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* FORMATAR NUMERO */
function formatarNumero(num){
    if(!num) return "";
    num = num.replace(/\D/g,"");
    if(!num.startsWith("55")) num = "55"+num;
    return num;
}

/* LOG */
function log(msg){
    const el = document.getElementById("logs");
    const t = new Date().toLocaleTimeString();
    el.innerHTML += `[${t}] ${msg}<br>`;
    el.scrollTop = el.scrollHeight;
}

/* PREVIEW */
function atualizarPreview(){
    const nome = document.getElementById("nome").value || "Item";
    const desc = document.getElementById("descricao").value || "...";
    const preco = document.getElementById("preco").value || "0";
    const raridade = document.getElementById("raridade").value;
    const destaque = document.getElementById("destaque").checked;

    document.getElementById("previewCard").innerHTML = `
        <div class="${destaque ? "destaque" : ""}">
            ${destaque ? `<div class="badge">DESTAQUE</div>` : ""}
            <b>${nome}</b>
            <p>${desc}</p>
            💰 ${preco}
            ${raridade ? `<div class="raridade ${raridade}">${raridade}</div>` : ""}
        </div>
    `;
}

["nome","descricao","preco","raridade","destaque"].forEach(id=>{
    document.getElementById(id).addEventListener("input", atualizarPreview);
});

/* PUBLICAR */
async function publicar(){

    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const raridade = document.getElementById("raridade").value;
    const destaque = document.getElementById("destaque").checked;
    let whatsapp = formatarNumero(document.getElementById("whatsapp").value);

    if(!raridade){
        alert("Escolhe a raridade");
        return;
    }

    const { error } = await client.from("itens").insert([{
        nome, descricao, preco, raridade, whatsapp, destaque
    }]);

    if(error){
        log("erro: "+error.message);
        return;
    }

    log("item publicado");

    document.getElementById("destaque").checked = false;

    carregar();
}

/* CARREGAR */
async function carregar(){

    const { data } = await client.from("itens").select("*");

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(p=>{
        lista.innerHTML += `
        <div class="card ${p.destaque ? "destaque" : ""}">
            ${p.destaque ? `<div class="badge">DESTAQUE</div>` : ""}
            <b>${p.nome}</b>
            <p>${p.descricao}</p>
            💰 ${p.preco}
            ${p.raridade ? `<div class="raridade ${p.raridade}">${p.raridade}</div>` : ""}
            <button class="delBtn" onclick="del('${p.id}')">Excluir</button>
        </div>
        `;
    });
}

/* DELETE */
async function del(id){
    await client.from("itens").delete().eq("id",id);
    carregar();
}

function goAdmin(){
    window.location.href="/admin";
}

async function logout(){
    await client.auth.signOut();
    window.location.href="/index.html";
}

carregar();
</script>

</body>
</html>
