<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itens - Loja</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
}

/* topo */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#0a0a0f;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.header h1{
    color:#00ffff;
}

.back{
    color:#00ffff;
    text-decoration:none;
    border:1px solid #00ffff;
    padding:6px 12px;
    border-radius:10px;
}

/* container */
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* grid */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

/* card */
.card{
    background:#0a0a0f;
    border-radius:12px;
    padding:15px;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
    border:1px solid rgba(0,255,255,0.2);
}

.card img{
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
}

.nome{
    font-size:16px;
    font-weight:bold;
    color:#00ffff;
}

.desc{
    font-size:14px;
    color:#9ca3af;
    margin:8px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
    margin-top:5px;
}

/* botão */
.buy{
    display:block;
    margin-top:10px;
    text-align:center;
    padding:10px;
    border-radius:10px;
    border:1px solid #00ff88;
    color:#00ff88;
    text-decoration:none;
    transition:0.2s;
}

.buy:hover{
    background:#00ff88;
    color:#000;
}

/* vazio */
.empty{
    text-align:center;
    margin-top:40px;
    color:#6b7280;
}
</style>
</head>

<body>

<div class="header">
    <h1>📦 ITENS</h1>
    <a href="/catalogo" class="back">⬅ Voltar</a>
</div>

<div class="container">
    <div class="grid" id="lista"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* CONFIG WHATSAPP PADRÃO */
const WHATSAPP_PADRAO = "5599999999999"; // troca pelo seu

async function carregar(){

    const { data, error } = await client
        .from("itens")
        .select("*")
        .order("id",{ascending:false});

    const lista = document.getElementById("lista");

    if(error){
        lista.innerHTML = "<p class='empty'>Erro ao carregar</p>";
        return;
    }

    if(!data || data.length === 0){
        lista.innerHTML = "<p class='empty'>Nenhum item disponível</p>";
        return;
    }

    data.forEach(item=>{

        const msg = encodeURIComponent(
            "Olá! Quero comprar este item: " + item.nome
        );

        const link = `https://wa.me/${WHATSAPP_PADRAO}?text=${msg}`;

        lista.innerHTML += `
        <div class="card">
            ${item.imagem ? `<img src="${item.imagem}">` : ""}

            <div class="nome">${item.nome}</div>

            <div class="desc">${item.descricao || ""}</div>

            <div class="price">💰 R$ ${item.preco}</div>

            <a href="${link}" target="_blank" class="buy">
                🛒 Comprar
            </a>
        </div>
        `;
    });
}

carregar();
</script>

</body>
</html>
