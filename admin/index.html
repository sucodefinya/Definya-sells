<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Debug</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:#e2e8f0;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1220;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:6px 0;
    background:#111827;
    border:none;
    color:#fff;
    border-radius:10px;
}

button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.add{ background:#22c55e; width:100%; }
.logout{ background:#ef4444; color:#fff; }

.card{
    background:#0b1220;
    padding:12px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.05);
}

#logs{
    margin-top:20px;
    background:#000;
    padding:10px;
    font-family:monospace;
    font-size:12px;
    height:180px;
    overflow:auto;
    border-radius:10px;
    border:1px solid #222;
}
</style>
</head>

<body>

<div class="topbar">
    <h3>🔐 Admin Debug</h3>
    <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="container">

    <input id="nome" placeholder="Nome">
    <textarea id="descricao" placeholder="Descrição"></textarea>
    <input id="preco" placeholder="Preço">

    <button class="add" onclick="publicar()">Publicar</button>

    <h3>📦 Produtos</h3>
    <div id="lista"></div>

    <h3>📜 Logs</h3>
    <div id="logs"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

// LOG SYSTEM
function log(msg){
    const el = document.getElementById("logs");
    const time = new Date().toLocaleTimeString();

    el.innerHTML += `[${time}] ${msg}<br>`;
    el.scrollTop = el.scrollHeight;
}

// ALERT LOG
function alertLog(msg){
    alert(msg);
    log(msg);
}

// INIT
log("📡 Inicializando Supabase...");
log("🌐 Conectando...");

setTimeout(() => {
    log("✅ Supabase conectado");
    alertLog("Supabase conectado");
}, 800);

// LOGIN CHECK
async function checkAuth(){
    const { data } = await supabase.auth.getSession();
    const user = data?.session?.user;

    if(user){
        log(`🔐 Admin logado: ${user.email}`);
    } else {
        log("❌ Não logado");
        window.location.href = "/loginadm/";
    }
}

// CARREGAMENTO
async function carregar(){
    log("📦 Carregando produtos...");

    const { data, error } = await supabase
        .from("produtos")
        .select("*");

    if(error){
        log("❌ Erro ao carregar: " + error.message);
        alert(error.message);
        return;
    }

    log(`📊 ${data.length} produtos carregados`);

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(p=>{
        lista.innerHTML += `
            <div class="card">
                <b>${p.nome}</b><br>
                ${p.descricao}<br>
                💰 ${p.preco}
            </div>
        `;
    });
}

// PUBLICAR
async function publicar(){
    log("🚀 Publicando produto...");

    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;

    const { error } = await supabase.from("produtos").insert([{
        nome,
        descricao,
        preco
    }]);

    if(error){
        log("❌ Erro: " + error.message);
        alert(error.message);
        return;
    }

    log("✅ Produto publicado");
    carregar();
}

// LOGOUT
async function logout(){
    await supabase.auth.signOut();
    log("🚪 Logout feito");
    window.location.href = "/loginadm/";
}

// START
log("📄 Página carregada");
checkAuth();
carregar();
</script>

</body>
</html>
