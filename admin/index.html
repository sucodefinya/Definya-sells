<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:#e2e8f0;
}

/* topo */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#0b1220;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logout{
    background:#ef4444;
    color:#fff;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

/* container */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#111827;
    color:#fff;
}

button{
    padding:12px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.add{
    width:100%;
    background:#22c55e;
    color:#000;
    font-weight:bold;
    margin-top:10px;
}

/* cards */
.card{
    background:#0b1220;
    padding:15px;
    margin-top:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.05);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.delete{ background:#ef4444; color:#fff; margin-right:5px; }
.star{ background:#eab308; color:#000; }

#preview img{
    max-height:200px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h3>🔐 Painel Admin</h3>
    <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="container">

    <input id="nome" placeholder="Nome do produto">
    <textarea id="descricao" rows="4" placeholder="Descrição"></textarea>
    <input id="preco" type="number" placeholder="Preço">
    <input id="whatsapp" placeholder="WhatsApp">

    <input id="imagemInput" type="file">

    <div id="preview"></div>

    <button class="add" onclick="publicar()">🚀 Publicar</button>

    <h3>📦 Produtos</h3>
    <div id="lista"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* 🔐 PROTEÇÃO REAL */
async function checkAuth(){
    const { data } = await supabase.auth.getSession();

    if(!data.session){
        window.location.href = "admin-login.html";
    }
}
checkAuth();

/* logout */
async function logout(){
    await supabase.auth.signOut();
    window.location.href = "admin-login.html";
}

/* upload */
let imagemFile = null;

document.getElementById("imagemInput").addEventListener("change",(e)=>{
    imagemFile = e.target.files[0];

    const reader = new FileReader();
    reader.onload = (ev)=>{
        document.getElementById("preview").innerHTML =
        `<img src="${ev.target.result}">`;
    };
    reader.readAsDataURL(imagemFile);
});

async function uploadImagem(){
    if(!imagemFile) return null;

    const fileName = `produto-${Date.now()}.${imagemFile.name.split('.').pop()}`;

    await supabase.storage.from("produtos")
    .upload(fileName, imagemFile, { upsert:true });

    const { data } = supabase.storage.from("produtos").getPublicUrl(fileName);
    return data.publicUrl;
}

/* publicar */
async function publicar(){
    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const whatsapp = document.getElementById("whatsapp").value;

    let img = await uploadImagem();

    await supabase.from("produtos").insert([{
        nome,
        descricao,
        preco,
        whatsapp,
        imagem: img,
        destaque:false
    }]);

    carregar();
}

/* carregar */
async function carregar(){
    const { data } = await supabase.from("produtos").select("*");

    document.getElementById("lista").innerHTML =
    data.map(p=>`
        <div class="card">
            <b>${p.nome}</b><br>
            ${p.imagem ? `<img src="${p.imagem}">` : ""}
            <p>${p.descricao}</p>
            💰 ${p.preco}<br><br>

            <button class="delete" onclick="del('${p.id}')">Excluir</button>
            <button class="star" onclick="star('${p.id}',${p.destaque})">
                Destaque
            </button>
        </div>
    `).join("");
}

/* ações */
async function del(id){
    await supabase.from("produtos").delete().eq("id",id);
    carregar();
}

async function star(id,val){
    await supabase.from("produtos")
    .update({destaque:!val}).eq("id",id);
    carregar();
}

carregar();
</script>

</body>
</html>
