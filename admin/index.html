<!DOCTYPE html>  
<html lang="pt-br">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Admin Completo</title>  
  
<style>  
body{  
    margin:0;  
    font-family:Arial;  
    background:#05060a;  
    color:#e2e8f0;  
}  
  
.topbar{  
    display:flex;  
    justify-content:space-between;  
    align-items:center;
    padding:15px;  
    background:#0b1220;  
}  

.top-actions{
    display:flex;
    gap:10px;
}
  
.container{  
    max-width:900px;  
    margin:auto;  
    padding:20px;  
}  
  
input, textarea{  
    width:100%;  
    padding:12px;  
    margin:6px 0;  
    background:#111827;  
    border:none;  
    color:#fff;  
    border-radius:10px;  
}  
  
button{  
    padding:10px;  
    border:none;  
    border-radius:8px;  
    cursor:pointer;  
}  
  
.logout{  
    background:#ef4444;  
    color:#fff;  
}  

.goItens{
    background:#00ffff;
    color:#000;
}

.goLinks{
    background:#ff2a2a;
    color:#000;
}
  
.add{  
    background:#22c55e;  
    width:100%;  
    font-weight:bold;  
    margin-top:10px;  
}  
  
.card{  
    background:#0b1220;  
    padding:12px;  
    margin-top:12px;  
    border-radius:10px;  
    border:1px solid rgba(255,255,255,0.05);  
}  
  
img{  
    width:100%;  
    border-radius:10px;  
    margin-top:8px;  
}  
  
.actions{  
    margin-top:10px;  
    display:flex;  
    gap:8px;  
}  
  
.delBtn{  
    background:#ef4444;  
    color:#fff;  
}  
  
.favBtn{  
    background:#facc15;  
    color:#000;  
}  

.removeImg{
    margin-top:8px;
    background:#ef4444;
    color:#fff;
}
  
#logs{  
    margin-top:15px;  
    background:#000;  
    padding:10px;  
    font-family:monospace;  
    font-size:12px;  
    height:150px;  
    overflow:auto;  
    border-radius:10px;  
}  

.previewTitle{
    margin-top:20px;
    color:#00ffff;
}
</style>  
</head>  
  
<body>  
  
<div class="topbar">  
    <h3>🔐 Admin</h3>  

    <div class="top-actions">
        <button class="goItens" onclick="goItens()">📦 Itens</button>
        <button class="goLinks" onclick="goLinks()">🔗 Links</button>
        <button class="logout" onclick="logout()">🚪 Sair</button>  
    </div>
</div>  
  
<div class="container">  
  
    <h3>➕ Adicionar Produto</h3>  
  
    <input id="nome" placeholder="Nome do produto">  
    <textarea id="descricao" placeholder="Descrição"></textarea>  
    <input id="preco" placeholder="Preço">  
    <input id="whatsapp" placeholder="WhatsApp">  
  
    <input type="file" id="imagemInput">  
  
    <div id="preview"></div>

    <h3 class="previewTitle">👀 Preview do Produto</h3>
    <div id="previewCard" class="card"></div>
  
    <button class="add" onclick="publicar()">PUBLICAR</button>  
  
    <h3>📦 Produtos</h3>  
    <div id="lista"></div>  
  
    <h3>📜 Logs</h3>  
    <div id="logs"></div>  
  
</div>  
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  
  
<script>  
const client = supabase.createClient(  
  "https://dbqleycdrkdhxrozsmup.supabase.co",  
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"  
);  
  
let imagemFile = null;  

/* FORMATAR WHATSAPP */
function formatarNumero(num){
    if(!num) return "";
    num = num.replace(/\D/g,"");

    if(!num.startsWith("55")){
        num = "55" + num;
    }

    return num;
}
  
function log(msg){  
    const el = document.getElementById("logs");  
    const t = new Date().toLocaleTimeString();  
    el.innerHTML += `[${t}] ${msg}<br>`;  
    el.scrollTop = el.scrollHeight;  
}  

log("📄 Admin carregado");

/* PREVIEW */
function atualizarPreview(){
    const nome = document.getElementById("nome").value || "Nome do produto";
    const descricao = document.getElementById("descricao").value || "Descrição...";
    const preco = document.getElementById("preco").value || "0.00";

    let imgHTML = "";

    if(imagemFile){
        const url = URL.createObjectURL(imagemFile);
        imgHTML = `<img src="${url}">`;
    }

    document.getElementById("previewCard").innerHTML = `
        <b style="font-size:18px;">${nome}</b>
        ${imgHTML}
        <p>${descricao}</p>
        <div style="color:#00ff88;font-weight:bold;">
            💰 R$ ${preco}
        </div>
    `;
}

["nome","descricao","preco"].forEach(id=>{
    document.getElementById(id).addEventListener("input", atualizarPreview);
});

/* IMAGE */
document.getElementById("imagemInput").addEventListener("change",(e)=>{  
    imagemFile = e.target.files[0];  
    
    if(!imagemFile){
        limparPreviewImagem();
        atualizarPreview();
        return;
    }

    const reader = new FileReader();

    reader.onload = (ev)=>{
        document.getElementById("preview").innerHTML = `
            <img src="${ev.target.result}">
            <br>
            <button class="removeImg" onclick="removerImagem()">❌ Remover imagem</button>
        `;
    };

    reader.readAsDataURL(imagemFile);

    log("🖼️ imagem selecionada");  
    atualizarPreview();
});  

function removerImagem(){
    imagemFile = null;
    document.getElementById("imagemInput").value = "";
    limparPreviewImagem();
    atualizarPreview();
}

function limparPreviewImagem(){
    document.getElementById("preview").innerHTML = "";
}

/* UPLOAD */  
async function uploadImagem(){  
    if(!imagemFile) return null;  
  
    const fileName = `produto-${Date.now()}.${imagemFile.name.split('.').pop()}`;  
  
    const { error } = await client.storage  
        .from("produtos")  
        .upload(fileName, imagemFile, { upsert:true });  
  
    if(error){  
        log("❌ erro upload: " + error.message);  
        return null;  
    }  
  
    const { data } = client.storage  
        .from("produtos")  
        .getPublicUrl(fileName);  
  
    return data.publicUrl;  
}  
  
/* PUBLICAR */  
async function publicar(){  
  
    log("🚀 publicando...");  
  
    const nome = document.getElementById("nome").value;  
    const descricao = document.getElementById("descricao").value;  
    const preco = document.getElementById("preco").value;  
    let whatsapp = formatarNumero(document.getElementById("whatsapp").value);  
  
    const img = await uploadImagem();  
  
    const { error } = await client.from("produtos").insert([{  
        nome, descricao, preco, whatsapp, imagem: img, destaque:false  
    }]);  
  
    if(error){  
        log("❌ erro: " + error.message);  
        return;  
    }  
  
    log("✅ produto publicado");  

    document.getElementById("nome").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("whatsapp").value = "";

    removerImagem();
    document.getElementById("previewCard").innerHTML = "";

    carregar();  
}  
  
/* CARREGAR */  
async function carregar(){  
    const { data } = await client.from("produtos").select("*").order("id",{ascending:false});  

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(p=>{
        lista.innerHTML += `
        <div class="card">
            <b>${p.nome}</b>
            ${p.imagem ? `<img src="${p.imagem}">` : ""}
            <p>${p.descricao}</p>
            💰 R$ ${p.preco}

            <div class="actions">
                <button class="delBtn" onclick="del('${p.id}')">🗑 Excluir</button>
                <button class="favBtn" onclick="fav('${p.id}', ${p.destaque})">
                    ⭐ ${p.destaque ? "Remover" : "Destacar"}
                </button>
            </div>
        </div>
        `;
    });

    log("📦 carregado: " + data.length);
}

/* DELETE */
async function del(id){
    await client.from("produtos").delete().eq("id",id);
    carregar();
}

/* FAVORITO */
async function fav(id, atual){
    const { data } = await client.from("produtos").select("*").eq("destaque", true);

    if(!atual && data.length >= 3){
        alert("Limite de 3 destaques");
        return;
    }

    await client.from("produtos")
    .update({ destaque: !atual })
    .eq("id", id);

    carregar();
}

/* NAV */
function goItens(){
    window.location.href = "/admini";
}

function goLinks(){
    window.location.href = "/admin/addlink/";
}

/* LOGOUT */
async function logout(){
    await client.auth.signOut();
    window.location.href = "/index.html";
}

carregar();
</script>  
  
</body>  
</html>
