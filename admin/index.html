<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
    body { margin:0; font-family: Arial, sans-serif; background:#0f172a; color:#e2e8f0; }
    .container { max-width: 900px; margin: 0 auto; padding:20px; }
    input, textarea { width:100%; padding:14px; margin:10px 0; border-radius:10px; border:none; background:#1e2937; color:white; font-size:16px; }
    button { padding:14px 20px; border:none; border-radius:10px; cursor:pointer; margin:8px 0; font-weight:600; font-size:16px; }
    .add { background:#22c55e; width:100%; font-size:18px; }
    .delete { background:#ef4444; color:white; }
    .star { background:#eab308; color:black; }
    .card { background:#1e2937; padding:15px; margin-top:15px; border-radius:12px; }
    img { max-width:100%; border-radius:10px; margin:10px 0; }
    #preview { margin:15px 0; text-align:center; }
    #preview img { max-height:250px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    #logs { margin-top:30px; background:#020617; padding:15px; border-radius:10px; font-family:monospace; font-size:13px; max-height:320px; overflow-y:auto; line-height:1.4; }
</style>
</head>
<body>

<div class="container">
    <h2>🔐 Painel Admin</h2>

    <input id="nome" placeholder="Nome do produto">
    <textarea id="descricao" rows="4" placeholder="Descrição do produto"></textarea>
    <input id="preco" type="number" step="0.01" placeholder="Preço (ex: 29.90)">
    <input id="whatsapp" placeholder="WhatsApp (ex: 11987654321)">

    <label style="display:block; margin:15px 0 8px; font-weight:bold;">📸 Imagem do produto</label>
    <input id="imagemInput" type="file" accept="image/*" style="padding:12px; background:#1e2937; width:100%;">

    <div id="preview"></div>

    <button class="add" onclick="publicar()">🚀 Publicar Produto</button>

    <h3>📦 Produtos Cadastrados</h3>
    <div id="lista"></div>

    <div id="logs"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
    const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

    const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

    let imagemFile = null;

    function log(msg, type = 'info') {
        const el = document.getElementById("logs");
        const time = new Date().toLocaleTimeString('pt-BR');
        const prefix = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
        el.innerHTML += `[${time}] ${prefix} ${msg}<br>`;
        el.scrollTop = el.scrollHeight;
    }

    // Preview da imagem
    document.getElementById('imagemInput').addEventListener('change', (e) => {
        imagemFile = e.target.files[0];
        if (!imagemFile) return;

        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('preview').innerHTML = `
                <img src="${ev.target.result}" alt="Pré-visualização">
                <small style="color:#86efac; display:block; margin-top:8px;">Imagem selecionada da galeria ✓</small>
            `;
        };
        reader.readAsDataURL(imagemFile);
    });

    // === FUNÇÃO CORRIGIDA DO UPLOAD ===
    async function uploadImagem() {
        if (!imagemFile) return null;

        const fileExt = imagemFile.name.split('.').pop().toLowerCase();
        const fileName = `produto-\( {Date.now()}. \){fileExt}`;

        log(`📤 Enviando imagem... (${fileName})`);

        const { error: uploadError } = await client.storage
            .from('produtos')
            .upload(fileName, imagemFile, { 
                upsert: true,
                contentType: imagemFile.type 
            });

        if (uploadError) {
            log("Erro no upload: " + uploadError.message, "error");
            console.error(uploadError);
            return null;
        }

        const { data: urlData } = client.storage.from('produtos').getPublicUrl(fileName);
        log("✅ Imagem enviada com sucesso", "success");
        return urlData.publicUrl;
    }

    async function publicar() {
        const nome = document.getElementById("nome").value.trim();
        const descricao = document.getElementById("descricao").value.trim();
        const precoStr = document.getElementById("preco").value.trim();
        const whatsapp = document.getElementById("whatsapp").value.trim();

        if (!nome || !descricao || !precoStr) {
            log("❌ Nome, descrição e preço são obrigatórios", "error");
            return;
        }

        let imagemUrl = null;
        if (imagemFile) {
            imagemUrl = await uploadImagem();
            if (!imagemUrl) return;
        }

        const { error } = await client.from("produtos").insert([{
            nome,
            descricao,
            preco: parseFloat(precoStr),
            whatsapp: whatsapp || null,
            imagem: imagemUrl,
            destaque: false
        }]);

        if (error) {
            log("Erro ao publicar: " + error.message, "error");
        } else {
            log(`✅ Produto "${nome}" publicado com sucesso!`, "success");
            
            // Limpa tudo
            document.getElementById("nome").value = "";
            document.getElementById("descricao").value = "";
            document.getElementById("preco").value = "";
            document.getElementById("whatsapp").value = "";
            document.getElementById("imagemInput").value = "";
            document.getElementById("preview").innerHTML = "";
            imagemFile = null;

            carregar();
        }
    }

    async function carregar() {
        const { data, error } = await client
            .from("produtos")
            .select("*")
            .order("criado_em", { ascending: false });

        if (error) {
            log("Erro ao carregar produtos: " + error.message, "error");
            return;
        }

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!data || data.length === 0) {
            lista.innerHTML = "<p style='color:#64748b; padding:10px;'>Nenhum produto cadastrado ainda.</p>";
            return;
        }

        data.forEach(item => {
            const imgHtml = item.imagem 
                ? `<img src="\( {item.imagem}" alt=" \){item.nome}">` 
                : '<p style="color:#64748b;">Sem imagem</p>';

            const whatsappHtml = item.whatsapp 
                ? `<br>📱 WhatsApp: <a href="https://wa.me/\( {item.whatsapp}" target="_blank" style="color:#22c55e;"> \){item.whatsapp}</a>` 
                : '';

            lista.innerHTML += `
                <div class="card">
                    <b>${item.nome}</b> ${item.destaque ? "⭐" : ""}<br><br>
                    ${imgHtml}
                    ${item.descricao}<br><br>
                    💰 R$ ${parseFloat(item.preco).toFixed(2)}
                    ${whatsappHtml}<br><br>

                    <button class="delete" onclick="deletar('${item.id}')">🗑️ Excluir</button>
                    <button class="star" onclick="toggleDestaque('${item.id}', ${!!item.destaque})">
                        ${item.destaque ? "Remover destaque" : "Destacar"}
                    </button>
                </div>
            `;
        });
    }

    async function deletar(id) {
        if (!confirm("Excluir este produto?")) return;
        await client.from("produtos").delete().eq("id", id);
        log("🗑️ Produto excluído", "success");
        carregar();
    }

    async function toggleDestaque(id, atual) {
        await client.from("produtos").update({ destaque: !atual }).eq("id", id);
        log("⭐ Destaque atualizado", "success");
        carregar();
    }

    // Inicia
    log("✅ Painel carregado - Escolha a imagem da galeria", "success");
    carregar();
</script>
</body>
</html>
