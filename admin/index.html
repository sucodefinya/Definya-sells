<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin-top: 5px;
  cursor: pointer;
}

.add { background: #22c55e; width: 100%; }
.delete { background: red; }
.star { background: gold; color: black; }

.card {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

#logs {
  margin-top: 20px;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Admin</h2>

  <input id="nome" placeholder="Nome do item">
  <textarea id="descricao" placeholder="Descrição"></textarea>
  <input id="preco" placeholder="Preço">

  <button class="add" onclick="publicar()">Publicar</button>

  <h3>📦 Produtos:</h3>
  <div id="lista"></div>

  <div id="logs"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
function log(msg) {
  const el = document.getElementById("logs");
  el.innerHTML += msg + "<br>";
}

const { createClient } = supabase;

const client = createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRicWxleWNkcmtkaHhyb3pzbXVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzYwOTQsImV4cCI6MjA5MTc1MjA5NH0.KWT_IMxwmD_fcAf1g9c8oE5m682_BNo_vjSZlZtZNA"
);

log("✅ Admin conectado");

async function carregar() {
  const { data } = await client
    .from("produtos")
    .select("*")
    .order("criado_em", { ascending: false });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(item => {
    lista.innerHTML += `
      <div class="card">
        <b>${item.nome}</b> ${item.destaque ? "⭐" : ""}<br>
        ${item.descricao}<br>
        💰 R$ ${item.preco}<br>

        <button class="delete" onclick="deletar('${item.id}')">Excluir</button>
        <button class="star" onclick="toggleDestaque('${item.id}', ${item.destaque})">
          ${item.destaque ? "Remover destaque" : "Destacar"}
        </button>
      </div>
    `;
  });
}

async function publicar() {
  const nome = document.getElementById("nome").value;
  const descricao = document.getElementById("descricao").value;
  const preco = document.getElementById("preco").value;

  if (!nome || !descricao || !preco) {
    log("❌ Preencha tudo");
    return;
  }

  await client.from("produtos").insert([
    { nome, descricao, preco }
  ]);

  log("✅ Produto criado");

  document.getElementById("nome").value = "";
  document.getElementById("descricao").value = "";
  document.getElementById("preco").value = "";

  carregar();
}

async function deletar(id) {
  await client.from("produtos").delete().eq("id", id);
  log("🗑️ Produto deletado");
  carregar();
}

async function toggleDestaque(id, atual) {
  await client
    .from("produtos")
    .update({ destaque: !atual })
    .eq("id", id);

  log("⭐ Atualizado destaque");
  carregar();
}

carregar();
</script>

</body>
  </html>
