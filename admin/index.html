<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Debug FIX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:#e2e8f0;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1220;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:6px 0;
    background:#111827;
    border:none;
    color:#fff;
    border-radius:10px;
}

button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.add{ background:#22c55e; width:100%; }
.logout{ background:#ef4444; color:#fff; }

.card{
    background:#0b1220;
    padding:12px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.05);
}

img{
    width:100%;
    border-radius:10px;
    margin-top:8px;
}

#logs{
    margin-top:15px;
    background:#000;
    padding:10px;
    font-family:monospace;
    font-size:12px;
    height:180px;
    overflow:auto;
    border-radius:10px;
    border:1px solid #222;
}
</style>
</head>

<body>

<div class="topbar">
    <h3>🔐 Admin Debug</h3>
    <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="container">

    <input id="nome" placeholder="Nome">
    <textarea id="descricao" placeholder="Descrição"></textarea>
    <input id="preco" placeholder="Preço">
    <input id="whatsapp" placeholder="WhatsApp">

    <input type="file" id="imagemInput">

    <button class="add" onclick="publicar()">Publicar</button>

    <h3>📦 Produtos</h3>
    <div id="lista"></div>

    <h3>📜 Logs</h3>
    <div id="logs"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =======================
   SUPABASE (CORRETO)
======================= */
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "SUA_ANON_KEY_AQUI"
);

/* =======================
   LOG SYSTEM
======================= */
function log(msg){
    const el = document.getElementById("logs");
    const time = new Date().toLocaleTimeString();
    el.innerHTML += `[${time}] ${msg}<br>`;
    el.scrollTop = el.scrollHeight;
}

/* start logs */
log("📄 Página carregada");
log("⚡ Inicializando sistema...");

/* =======================
   IMAGE
======================= */
let imagemFile = null;

document.getElementById("imagemInput").addEventListener("change",(e)=>{
    imagemFile = e.target.files[0];
    log("🖼️ Imagem selecionada");
});

/* =======================
   UPLOAD IMAGEM
======================= */
async function uploadImagem(){
    if(!imagemFile){
        log("⚠️ Sem imagem");
        return null;
    }

    const fileName = `produto-${Date.now()}.${imagemFile.name.split('.').pop()}`;

    log("📤 Enviando imagem...");

    const { error } = await client.storage
        .from("produtos")
        .upload(fileName, imagemFile, { upsert:true });

    if(error){
        log("❌ Erro upload: " + error.message);
        return null;
    }

    const { data } = client.storage
        .from("produtos")
        .getPublicUrl(fileName);

    log("✅ Imagem enviada");

    return data.publicUrl;
}

/* =======================
   PUBLICAR
======================= */
async function publicar(){
    log("🚀 Publicando produto...");

    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const whatsapp = document.getElementById("whatsapp").value;

    const img = await uploadImagem();

    const { error } = await client.from("produtos").insert([{
        nome,
        descricao,
        preco,
        whatsapp,
        imagem: img,
        destaque:false
    }]);

    if(error){
        log("❌ Erro: " + error.message);
        return;
    }

    log("✅ Produto publicado");

    carregar();
}

/* =======================
   CARREGAR
======================= */
async function carregar(){
    log("📦 Carregando produtos...");

    const { data, error } = await client
        .from("produtos")
        .select("*")
        .order("id",{ascending:false});

    if(error){
        log("❌ Erro load: " + error.message);
        return;
    }

    log(`📊 ${data.length} produtos encontrados`);

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(p=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${p.nome}</b><br>

            ${p.imagem ? `<img src="${p.imagem}">` : ""}

            <p>${p.descricao}</p>
            💰 ${p.preco}
        `;

        lista.appendChild(div);
    });
}

/* =======================
   LOGOUT
======================= */
async function logout(){
    await client.auth.signOut();
    log("🚪 Logout");
    window.location.href = "/loginadm/";
}

/* =======================
   INIT
======================= */
carregar();
</script>

</body>
</html>
