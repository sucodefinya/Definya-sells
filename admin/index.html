<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Final</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:#e2e8f0;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#0b1220;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.logout{
    background:#ef4444;
    color:#fff;
}

.add{
    background:#22c55e;
    width:100%;
    margin-top:10px;
}

.card{
    background:#0b1220;
    padding:12px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.05);
}

img{
    width:100%;
    border-radius:10px;
    margin-top:8px;
}

.actions{
    margin-top:10px;
    display:flex;
    gap:8px;
}

.delBtn{
    background:#ef4444;
    color:#fff;
}

.favBtn{
    background:#facc15;
    color:#000;
}

#logs{
    margin-top:15px;
    background:#000;
    padding:10px;
    font-family:monospace;
    font-size:12px;
    height:160px;
    overflow:auto;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
    <h3>🔐 Admin Panel</h3>
    <button class="logout" onclick="logout()">🚪 Sair</button>
</div>

<div class="container">

    <h3>📦 Produtos</h3>
    <div id="lista"></div>

    <h3>📜 Logs</h3>
    <div id="logs"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "SUA_ANON_KEY_AQUI"
);

/* ================= LOGS ================= */
function log(msg){
    const el = document.getElementById("logs");
    const t = new Date().toLocaleTimeString();
    el.innerHTML += `[${t}] ${msg}<br>`;
    el.scrollTop = el.scrollHeight;
}

log("📄 Admin carregado");

/* ================= CARREGAR ================= */
async function carregar(){

    log("📦 carregando produtos...");

    const { data, error } = await client
        .from("produtos")
        .select("*")
        .order("id",{ascending:false});

    if(error){
        log("❌ erro: " + error.message);
        return;
    }

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    if(!data || data.length === 0){
        lista.innerHTML = "<p>Nenhum produto ainda</p>";
        return;
    }

    data.forEach(p => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${p.nome}</b><br>

            ${p.imagem ? `<img src="${p.imagem}">` : ""}

            <p>${p.descricao}</p>
            💰 R$ ${p.preco || 0}

            <div class="actions">
                <button class="delBtn" onclick="del('${p.id}')">🗑 Excluir</button>

                <button class="favBtn" onclick="fav('${p.id}', ${p.destaque})">
                    ⭐ ${p.destaque ? "Remover" : "Favoritar"}
                </button>
            </div>
        `;

        lista.appendChild(div);
    });

    log("✅ produtos carregados: " + data.length);
}

/* ================= DELETE ================= */
async function del(id){

    log("🗑 deletando...");

    const { error } = await client
        .from("produtos")
        .delete()
        .eq("id", id);

    if(error){
        log("❌ erro delete: " + error.message);
        return;
    }

    log("✅ deletado");
    carregar();
}

/* ================= FAVORITO (3 LIMITES) ================= */
async function fav(id, atual){

    const { data } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true);

    const total = data?.length || 0;

    if(!atual && total >= 3){
        alert("Limite de 3 favoritos atingido");
        log("❌ limite 3 favoritos");
        return;
    }

    const { error } = await client
        .from("produtos")
        .update({ destaque: !atual })
        .eq("id", id);

    if(error){
        log("❌ erro fav: " + error.message);
        return;
    }

    log("⭐ atualizado favorito");
    carregar();
}

/* ================= LOGOUT ================= */
async function logout(){

    log("🚪 saindo...");

    await client.auth.signOut();

    window.location.href = "/index.html";
}

/* ================= INIT ================= */
carregar();
</script>

</body>
</html>
