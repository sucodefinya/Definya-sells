<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:#e2e8f0;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#0b1220;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#111827;
    color:#fff;
}

button{
    padding:12px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.add{
    width:100%;
    background:#22c55e;
    color:#000;
    font-weight:bold;
    margin-top:10px;
}

.logout{
    background:#ef4444;
    color:#fff;
}

.card{
    background:#0b1220;
    padding:15px;
    margin-top:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.05);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.delete{ background:#ef4444; color:#fff; margin-right:5px; }
.star{ background:#eab308; color:#000; }

#preview img{
    max-height:200px;
}
</style>
</head>

<body>

<div class="topbar">
    <h3>🔐 Admin</h3>
    <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="container">

    <input id="nome" placeholder="Nome do produto">
    <textarea id="descricao" placeholder="Descrição"></textarea>
    <input id="preco" type="number" placeholder="Preço">
    <input id="whatsapp" placeholder="WhatsApp">

    <input id="imagemInput" type="file">

    <div id="preview"></div>

    <button class="add" onclick="publicar()">🚀 Publicar</button>

    <h3>📦 Produtos</h3>
    <div id="lista"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

// 🔐 LOGIN CHECK
const ADMIN_EMAIL = "claudiogg270@gmail.com";

async function checkAuth(){
    const { data } = await supabase.auth.getSession();

    const user = data?.session?.user;

    if(!user){
        window.location.href = "/loginadm/";
        return;
    }

    if(user.email !== ADMIN_EMAIL){
        await supabase.auth.signOut();
        alert("Acesso negado");
        window.location.href = "/loginadm/";
    }
}

checkAuth();

// logout
async function logout(){
    await supabase.auth.signOut();
    window.location.href = "/loginadm/";
}

// upload imagem
let imagemFile = null;

document.getElementById("imagemInput").addEventListener("change",(e)=>{
    imagemFile = e.target.files[0];

    const reader = new FileReader();
    reader.onload = (ev)=>{
        document.getElementById("preview").innerHTML =
        `<img src="${ev.target.result}">`;
    };
    reader.readAsDataURL(imagemFile);
});

async function uploadImagem(){
    if(!imagemFile) return null;

    const fileName = `produto-${Date.now()}.${imagemFile.name.split('.').pop()}`;

    const { error } = await supabase.storage
        .from("produtos")
        .upload(fileName, imagemFile, { upsert:true });

    if(error){
        alert(error.message);
        return null;
    }

    const { data } = supabase.storage
        .from("produtos")
        .getPublicUrl(fileName);

    return data.publicUrl;
}

// publicar
async function publicar(){
    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const whatsapp = document.getElementById("whatsapp").value;

    let img = await uploadImagem();

    const { error } = await supabase.from("produtos").insert([{
        nome,
        descricao,
        preco,
        whatsapp,
        imagem: img,
        destaque:false
    }]);

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById("nome").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("whatsapp").value = "";
    document.getElementById("preview").innerHTML = "";
    imagemFile = null;

    carregar();
}

// carregar produtos
async function carregar(){
    const { data, error } = await supabase
        .from("produtos")
        .select("*")
        .order("id", { ascending:false });

    if(error){
        alert(error.message);
        return;
    }

    const lista = document.getElementById("lista");

    if(!data || data.length === 0){
        lista.innerHTML = "<p style='opacity:0.6'>Nenhum produto ainda</p>";
        return;
    }

    lista.innerHTML = "";

    data.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <b>${p.nome}</b><br>

            ${p.imagem ? `<img src="${p.imagem}">` : ""}

            <p>${p.descricao}</p>

            💰 R$ ${Number(p.preco || 0).toFixed(2)}<br><br>

            <button class="delete" onclick="del('${p.id}')">Excluir</button>
            <button class="star" onclick="star('${p.id}',${p.destaque})">
                ${p.destaque ? "Remover destaque" : "Destacar"}
            </button>
        `;

        lista.appendChild(card);
    });
}

// delete
async function del(id){
    await supabase.from("produtos").delete().eq("id",id);
    carregar();
}

// destaque
async function star(id,val){
    await supabase.from("produtos")
    .update({destaque:!val}).eq("id",id);
    carregar();
}

carregar();
</script>

</body>
</html>
