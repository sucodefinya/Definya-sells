<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:#e2e8f0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h2{
    margin-top:20px;
    color:#facc15;
}

.card{
    background:#1e2937;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#22c55e;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🏪 Minha Loja</h1>

    <h2>🔥 OS MAIS PROCURADOS</h2>
    <div id="destaques"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

async function carregarDestaques(){

    const { data, error } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");
    box.innerHTML = "";

    if(error){
        box.innerHTML = "Erro ao carregar";
        return;
    }

    if(!data || data.length === 0){
        box.innerHTML = "<p>Nenhum destaque ainda 😢</p>";
        return;
    }

    data.forEach(item => {

        box.innerHTML += `
            <div class="card">
                <h3>${item.nome}</h3>

                ${item.imagem ? `<img src="${item.imagem}">` : ""}

                <p>${item.descricao}</p>

                <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>
            </div>
        `;
    });
}

carregarDestaques();
</script>

</body>
</html>
