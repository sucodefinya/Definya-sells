<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050608;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* glow de fundo neon */
body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 60%);
    top:-200px;
    left:-200px;
    animation: float 10s ease-in-out infinite;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,0,255,0.12), transparent 60%);
    bottom:-200px;
    right:-200px;
    animation: float2 12s ease-in-out infinite;
    z-index:-1;
}

@keyframes float{
    0%,100%{ transform:translate(0,0); }
    50%{ transform:translate(40px,30px); }
}

@keyframes float2{
    0%,100%{ transform:translate(0,0); }
    50%{ transform:translate(-40px,-30px); }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff;
}

h2{
    text-align:center;
    color:#ff00ff;
    text-shadow:0 0 10px #ff00ff;
    margin-top:30px;
}

/* CARD NEON */
.card{
    background:rgba(15,15,20,0.9);
    padding:15px;
    margin:15px 0;
    border-radius:14px;
    border:1px solid rgba(0,255,255,0.15);
    box-shadow:0 0 10px rgba(0,255,255,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(0,255,255,0.4), 0 0 30px rgba(255,0,255,0.2);
    border:1px solid rgba(0,255,255,0.4);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
    transition:0.3s;
}

.card:hover img{
    transform:scale(1.03);
}

.price{
    color:#00ff88;
    font-weight:bold;
    font-size:18px;
    text-shadow:0 0 8px #00ff88;
}

/* BOTÃO NEON */
.btn{
    display:block;
    text-align:center;
    padding:14px;
    margin:25px 0;
    background:transparent;
    color:#00ffff;
    border:2px solid #00ffff;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
    text-shadow:0 0 8px #00ffff;
}

.btn:hover{
    background:#00ffff;
    color:#000;
    box-shadow:0 0 20px #00ffff;
}

/* efeito de linha neon suave */
.line{
    height:1px;
    background:linear-gradient(90deg, transparent, #00ffff, #ff00ff, transparent);
    margin:20px 0;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

    <h1>⚡ LOJA NEON</h1>

    <div class="line"></div>

    <h2>🔥 OS MAIS PROCURADOS</h2>
    <div id="destaques"></div>

    <a class="btn" href="dashboard.html">VER MAIS PRODUTOS</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

async function carregarDestaques(){

    const { data, error } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");
    box.innerHTML = "";

    if(error){
        box.innerHTML = "<p>Erro ao carregar</p>";
        return;
    }

    if(!data || data.length === 0){
        box.innerHTML = "<p>Nenhum destaque ainda 😢</p>";
        return;
    }

    data.forEach(item => {

        box.innerHTML += `
            <div class="card">
                <h3 style="color:#00ffff; text-shadow:0 0 8px #00ffff;">
                    ${item.nome}
                </h3>

                ${item.imagem ? `<img src="${item.imagem}">` : ""}

                <p>${item.descricao}</p>

                <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>
            </div>
        `;
    });
}

carregarDestaques();
</script>

</body>
</html>
