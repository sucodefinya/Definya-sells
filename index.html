<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000; /* PRETO DE VERDADE */
    color:#e5e7eb;
    overflow-x:hidden;
}

/* glow MUITO mais leve */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(0,255,255,0.06), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,0,255,0.05), transparent 60%);
    bottom:-200px;
    right:-200px;
    z-index:-1;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#00ffff;
    font-size:22px;
    text-shadow:0 0 6px rgba(0,255,255,0.3);
}

/* BOTÃO ADMIN VOLTOU */
.admin-btn{
    padding:8px 14px;
    border:1px solid #00ffff;
    color:#00ffff;
    background:transparent;
    border-radius:10px;
    text-decoration:none;
    font-size:14px;
    transition:0.2s;
}

.admin-btn:hover{
    background:#00ffff;
    color:#000;
}

/* título seção */
h2{
    text-align:center;
    margin-top:30px;
    color:#ff00ff;
    font-size:18px;
    text-shadow:0 0 6px rgba(255,0,255,0.2);
}

/* CARD LIMPO (sem exagero) */
.card{
    background:#0b0b0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
    border:1px solid rgba(0,255,255,0.2);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

/* botão ver mais mais discreto */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:25px 0;
    background:#0b0b0f;
    color:#00ffff;
    border:1px solid rgba(0,255,255,0.3);
    border-radius:10px;
    text-decoration:none;
    transition:0.2s;
}

.btn:hover{
    border-color:#00ffff;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>⚡ LOJA</h1>

        <!-- BOTÃO ADMIN DE VOLTA -->
        <a class="admin-btn" href="admin.html">Admin</a>
    </div>

    <h2>🔥 OS MAIS PROCURADOS</h2>
    <div id="destaques"></div>

    <!-- LINK CORRETO: dashboard (SEM .html) -->
    <a class="btn" href="dashboard">Ver mais produtos</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

async function carregarDestaques(){

    const { data, error } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");
    box.innerHTML = "";

    if(error || !data){
        box.innerHTML = "<p>Erro ao carregar</p>";
        return;
    }

    if(data.length === 0){
        box.innerHTML = "<p>Nenhum destaque ainda</p>";
        return;
    }

    data.forEach(item => {

        box.innerHTML += `
            <div class="card">
                <h3 style="color:#00ffff; font-size:16px;">
                    ${item.nome}
                </h3>

                ${item.imagem ? `<img src="${item.imagem}">` : ""}

                <p>${item.descricao}</p>

                <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>
            </div>
        `;
    });
}

carregarDestaques();
</script>

</body>
</html>
