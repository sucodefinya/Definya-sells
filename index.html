<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
}

/* partículas */
#bgParticles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    pointer-events:none;
}

.bg-particle{
    position:absolute;
    border-radius:50%;
    background: radial-gradient(circle, #ff2a2a, transparent);
    opacity:0.25;
    animation: floatUp linear forwards;
}

@keyframes floatUp{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:260px;
}

.admin-btn{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
}

/* botão catálogo */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:20px 0;
    background:#0a0a0f;
    color:#ff2a2a;
    border:1px solid rgba(255,0,0,0.3);
    border-radius:10px;
    text-decoration:none;
}

/* LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:20px;
}

.youtube-card{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:12px;
    background:#0a0a0f;
    border:1px solid rgba(255,0,0,0.3);
    text-decoration:none;
    color:#fff;
}

.youtube-icon{
    width:40px;
    height:40px;
    background:red;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.coinhub-card{
    padding:15px;
    border-radius:12px;
    background:#0a0a0f;
    border:1px solid #00ffff;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.link-btn{
    display:inline-block;
    padding:10px 14px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    border:1px solid #00ffff;
    color:#00ffff;
}

/* seção */
.section{
    margin-top:30px;
}

.section h2{
    color:#ff2a2a;
}

/* scroll */
.scroll{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding-bottom:10px;
}

/* card */
.card{
    min-width:240px;
    background:#0a0a0f;
    padding:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    position:relative;
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:10px;
}

/* destaque */
.destaque{
    border-color:#ff3c00;
    box-shadow:0 0 15px rgba(255,60,0,0.4);
}

.badge{
    position:absolute;
    top:10px;
    right:10px;
    background:#ff3c00;
    color:#000;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
}

/* preço */
.price{
    display:flex;
    align-items:center;
    gap:6px;
    color:#00ff88;
    font-weight:bold;
}

.price img{
    width:18px;
    height:18px;
}

/* botão comprar */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<div id="bgParticles"></div>

<div class="container">

    <div class="header">
        <img src="InShot_20260415_234108748.png" class="logo">
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <a class="btn" href="catalogo">📦 CATÁLOGO</a>

    <!-- LINKS -->
    <div id="linksBox"></div>

    <!-- CONTAS -->
    <div id="contasSection" class="section" style="display:none;">
        <h2>🔥 CONTAS EM DESTAQUE</h2>
        <div id="contasBox" class="scroll"></div>
    </div>

    <!-- ITENS -->
    <div id="itensSection" class="section" style="display:none;">
        <h2>🔥 ITENS EM DESTAQUE</h2>
        <div id="itensBox" class="scroll"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* partículas */
setInterval(()=>{
    const p = document.createElement("div");
    p.classList.add("bg-particle");
    p.style.width = (Math.random()*4+2)+"px";
    p.style.height = p.style.width;
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (6+Math.random()*6)+"s";

    document.getElementById("bgParticles").appendChild(p);
    setTimeout(()=>p.remove(),12000);
},300);

/* LINKS */
async function carregarLinks(){
    const { data } = await client.from("links").select("*");
    if(!data) return;

    let html = `<div class="links">`;

    data.forEach(l=>{
        if(l.tipo === "youtube"){
            html += `
            <a href="${l.url}" target="_blank" class="youtube-card">
                <div class="youtube-icon">▶</div>
                <div>
                    <b>YouTube</b><br>
                    <small>Acessar canal</small>
                </div>
            </a>`;
        }

        if(l.tipo === "coinhub"){
            html += `
            <div class="coinhub-card">
                <b>💸 QUER PAGAR BARATO?</b><br>
                COMPRE PELA COINS HUB<br><br>
                <a href="${l.url}" target="_blank" class="link-btn">
                    🚀 ENTRAR
                </a>
            </div>`;
        }
    });

    html += `</div>`;
    document.getElementById("linksBox").innerHTML = html;
}

/* CONTAS */
async function carregarContas(){
    const { data } = await client.from("produtos").select("*").eq("destaque", true);
    if(!data || data.length === 0) return;

    document.getElementById("contasSection").style.display = "block";

    document.getElementById("contasBox").innerHTML = data.map(p=>`
        <div class="card destaque">
            <div class="badge">DESTAQUE</div>
            <h4>${p.nome}</h4>
            <img src="${p.imagem || "default.png"}">
            <p>${p.descricao || ""}</p>
            <div class="price">
                <img src="price.png"> R$ ${parseFloat(p.preco).toFixed(2)}
            </div>
            <a class="buy-btn" href="https://wa.me/${p.whatsapp}">
                Comprar
            </a>
        </div>
    `).join("");
}

/* ITENS */
async function carregarItens(){
    const { data } = await client.from("itens").select("*").eq("destaque", true);
    if(!data || data.length === 0) return;

    document.getElementById("itensSection").style.display = "block";

    document.getElementById("itensBox").innerHTML = data.map(p=>`
        <div class="card destaque">
            <div class="badge">DESTAQUE</div>
            <h4>${p.nome}</h4>
            <img src="${p.imagem || "default.png"}">
            <p>${p.descricao || ""}</p>
            <div class="price">
                <img src="price.png"> R$ ${parseFloat(p.preco).toFixed(2)}
            </div>
            <a class="buy-btn" href="https://wa.me/${p.whatsapp}">
                Comprar
            </a>
        </div>
    `).join("");
}

/* INIT */
carregarLinks();
carregarContas();
carregarItens();
</script>

</body>
</html>
