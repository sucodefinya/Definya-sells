<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

/* logo */
#splash img{
    width:320px;
}

/* partículas splash */
.red-particle{
    position:absolute;
    width:4px;
    height:4px;
    background:#ff2a2a;
    border-radius:50%;
    animation:explode 0.8s linear forwards;
}

@keyframes explode{
    from{ transform:translate(0,0); opacity:1; }
    to{ transform:translate(var(--x), var(--y)); opacity:0; }
}

/* loading */
.loading-bar{
    width:220px;
    height:4px;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
}

.loading-fill{
    height:100%;
    width:0%;
    background:#ff2a2a;
    box-shadow:0 0 10px #ff2a2a;
}

.loading-text{
    margin-top:8px;
    color:#ff2a2a;
}

/* layout */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:260px;
}

/* botão */
.admin-btn{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
}

.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:20px 0;
    background:#0a0a0f;
    color:#ff2a2a;
    border:1px solid rgba(255,0,0,0.3);
    border-radius:10px;
    text-decoration:none;
}

/* título */
h2{
    text-align:center;
    margin-top:25px;
    color:#ff2a2a;
}

/* card */
.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    position:relative;
}

.card:hover{
    transform:translateY(-4px);
    border:1px solid rgba(255,0,0,0.4);
}

img{
    width:100%;
    border-radius:10px;
}

/* raridade */
.badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
    font-weight:bold;
}

.comum{ border-color:#6b7280; }
.incomum{ border-color:#22c55e; }
.raro{ border-color:#3b82f6; }
.epico{ border-color:#a855f7; }
.lendario{
    border-color:#facc15;
    box-shadow:0 0 15px rgba(250,204,21,0.5);
}

.comum .badge{ background:#6b7280; }
.incomum .badge{ background:#22c55e; }
.raro .badge{ background:#3b82f6; }
.epico .badge{ background:#a855f7; }
.lendario .badge{ background:#facc15; color:#000; }

/* preço com imagem */
.price{
    display:flex;
    align-items:center;
    gap:6px;
    color:#00ff88;
    font-weight:bold;
}

.price img{
    width:22px;
}

/* botão comprar */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
}

.buy-btn:hover{
    background:#ff2a2a;
    color:#000;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="InShot_20260415_234327721.png">

    <div class="loading-bar">
        <div class="loading-fill" id="fill"></div>
    </div>

    <div class="loading-text" id="text">0%</div>
</div>

<div class="container">

    <div class="header">
        <img src="InShot_20260415_234108748.png" class="logo">
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <a class="btn" href="catalogo">📦 CATÁLOGO</a>

    <h2>🔥 MAIS PROCURADOS</h2>
    <div id="destaques"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* FORMATAR NUMERO */
function formatarNumero(num){
    if(!num) return "5599999999999";
    num = num.replace(/\D/g,"");
    if(!num.startsWith("55")){
        num = "55" + num;
    }
    return num;
}

/* loading */
let progress = 0;
const fill = document.getElementById("fill");
const text = document.getElementById("text");
const splash = document.getElementById("splash");

const loading = setInterval(()=>{
    progress += Math.random()*10;

    if(progress >= 100){
        progress = 100;
        clearInterval(loading);

        setTimeout(()=>{
            splash.style.opacity = "0";
            setTimeout(()=> splash.remove(),500);
        },300);
    }

    fill.style.width = progress + "%";
    text.innerText = Math.floor(progress) + "%";
},120);

/* carregar */
async function carregarDestaques(){

    const { data } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");

    box.innerHTML = data.map(item=>{

        const raridade = item.raridade || "comum";
        const numero = formatarNumero(item.whatsapp);

        return `
        <div class="card ${raridade}">
            <div class="badge">${raridade}</div>

            <h3 style="color:#ff2a2a">${item.nome}</h3>

            ${item.imagem ? `<img src="${item.imagem}">` : ""}

            <p>${item.descricao}</p>

            <div class="price">
                <img src="/price.png">
                R$ ${parseFloat(item.preco).toFixed(2)}
            </div>

            <a class="buy-btn" href="https://wa.me/${numero}" target="_blank">
                🛒 Comprar
            </a>
        </div>
        `;
    }).join("");
}

carregarDestaques();
</script>

</body>
</html>
