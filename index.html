<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow:hidden;
}

/* 🔥 GLOW DE FOGO NEON */
body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(255,80,0,0.10), transparent 60%);
    top:-200px;
    left:-200px;
    animation: fireMove 8s ease-in-out infinite;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(0,255,255,0.08), transparent 60%);
    bottom:-200px;
    right:-200px;
    animation: fireMove2 10s ease-in-out infinite;
    z-index:-2;
}

@keyframes fireMove{
    0%,100%{ transform:translate(0,0); }
    50%{ transform:translate(40px,30px); }
}

@keyframes fireMove2{
    0%,100%{ transform:translate(0,0); }
    50%{ transform:translate(-40px,-30px); }
}

/* 🌌 partículas leves (não polui) */
.particle{
    position:fixed;
    width:3px;
    height:3px;
    background:white;
    box-shadow:0 0 6px rgba(255,255,255,0.8);
    border-radius:50%;
    opacity:0.6;
    animation: floatParticle linear infinite;
    z-index:-1;
}

@keyframes floatParticle{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
    position:relative;
    z-index:1;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#00ffff;
    text-shadow:0 0 8px rgba(0,255,255,0.3);
}

h2{
    text-align:center;
    margin-top:30px;
    color:#ff4d00; /* fogo neon */
    text-shadow:0 0 8px rgba(255,80,0,0.4);
}

/* CARD LIMPO */
.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
    border:1px solid rgba(255,80,0,0.25);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

/* BOTÃO ADMIN CORRIGIDO */
.admin-btn{
    padding:8px 14px;
    border:1px solid #00ffff;
    color:#00ffff;
    text-decoration:none;
    border-radius:10px;
    transition:0.2s;
}

.admin-btn:hover{
    background:#00ffff;
    color:#000;
}

/* botão ver mais */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:25px 0;
    background:#0a0a0f;
    color:#00ffff;
    border:1px solid rgba(0,255,255,0.25);
    border-radius:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>⚡ LOJA NEON</h1>
        <a class="admin-btn" href="admin">Admin</a>
    </div>

    <h2>🔥 OS MAIS PROCURADOS</h2>
    <div id="destaques"></div>

    <a class="btn" href="dashboard">Ver mais produtos</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

/* 🌌 partículas leves sem poluição */
function createParticles(){
    for(let i=0;i<18;i++){
        let p = document.createElement("div");
        p.classList.add("particle");

        p.style.left = Math.random()*100 + "vw";
        p.style.animationDuration = (6 + Math.random()*6) + "s";
        p.style.opacity = Math.random()*0.5 + 0.2;
        p.style.width = p.style.height = (2 + Math.random()*2) + "px";

        document.body.appendChild(p);
    }
}
createParticles();

async function carregarDestaques(){

    const { data, error } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");
    box.innerHTML = "";

    if(!data){
        box.innerHTML = "<p>Erro</p>";
        return;
    }

    if(data.length === 0){
        box.innerHTML = "<p>Nenhum destaque ainda</p>";
        return;
    }

    data.forEach(item => {
        box.innerHTML += `
            <div class="card">
                <h3 style="color:#00ffff">${item.nome}</h3>
                ${item.imagem ? `<img src="${item.imagem}">` : ""}
                <p>${item.descricao}</p>
                <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>
            </div>
        `;
    });
}

carregarDestaques();
</script>

</body>
</html>
