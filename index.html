<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definya Sells</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:#fff;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:240px;
    filter: drop-shadow(0 0 15px #ff2a2a);
}

.admin-btn{
    padding:10px 16px;
    border-radius:12px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    text-decoration:none;
    box-shadow:0 0 10px rgba(255,0,0,0.5);
}

/* CARD */
.card{
    background: linear-gradient(145deg,#0a0a0f,#050505);
    border-radius:16px;
    padding:15px;
    border:1px solid rgba(255,0,0,0.3);
    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.03),
        0 0 15px rgba(255,0,0,0.25);
    margin-bottom:15px;
}

/* YOUTUBE */
.youtube{
    display:flex;
    gap:12px;
    align-items:center;
}

.youtube-icon{
    width:50px;
    height:50px;
    background:red;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* BANNER */
.banner{
    background:#081010;
    border:1px solid #00ffff;
    border-radius:16px;
    padding:15px;
    box-shadow:0 0 25px rgba(0,255,255,0.4);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.banner img{
    width:120px;
}

/* TITULO */
.section-title{
    font-size:20px;
    margin:25px 0 10px;
}

.section-title span{
    color:#ff2a2a;
}

/* SCROLL */
.scroll{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

/* PRODUTO */
.produto{
    min-width:250px;
    background: linear-gradient(145deg,#0a0a0f,#050505);
    border-radius:16px;
    padding:12px;
    border:1px solid rgba(255,0,0,0.3);
    box-shadow:0 0 20px rgba(255,0,0,0.25);
    position:relative;
}

.produto img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:12px;
}

/* BADGE */
.badge{
    position:absolute;
    top:10px;
    right:10px;
    background:#ff2a2a;
    padding:5px 10px;
    border-radius:8px;
}

/* PREÇO */
.price{
    color:#00ff88;
    font-weight:bold;
}

/* BOTÃO */
.buy{
    display:block;
    text-align:center;
    margin-top:10px;
    padding:10px;
    background:#ff2a2a;
    border-radius:10px;
    color:#fff;
    text-decoration:none;
}

/* FOOTER */
.footer{
    display:flex;
    justify-content:space-around;
    margin-top:30px;
    padding:15px;
    border-top:1px solid rgba(255,255,255,0.1);
}

.footer div{
    text-align:center;
    font-size:12px;
}

/* SKELETON */
.skeleton{
    position:relative;
    overflow:hidden;
    background:#0a0a0f;
}

.skeleton::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shimmer 1.5s infinite;
}

@keyframes shimmer{
    100%{ left:100%; }
}

.skel-img{
    width:100%;
    height:140px;
    border-radius:12px;
    background:#111;
}

.skel-text{
    height:12px;
    margin:8px 0;
    border-radius:6px;
    background:#111;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="/logo.png" class="logo" onerror="this.src='https://via.placeholder.com/200x60'">
<a class="admin-btn">Admin</a>
</div>

<div class="card">📦 CATÁLOGO</div>

<div class="card youtube">
<div class="youtube-icon">▶</div>
<div><b>YouTube</b><br><small>Acessar canal</small></div>
</div>

<div class="banner">
<div>
<b>💸 QUER PAGAR BARATO?</b><br>
COMPRE PELA <span style="color:#00ffff">COINS HUB</span><br>
<button>ENTRAR</button>
</div>
<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
</div>

<div class="section-title">🔥 CONTAS <span>EM DESTAQUE</span></div>

<div id="contasBox" class="scroll">

<!-- SKELETON -->
<div class="produto skeleton">
<div class="skel-img"></div>
<div class="skel-text"></div>
<div class="skel-text"></div>
</div>

<div class="produto skeleton">
<div class="skel-img"></div>
<div class="skel-text"></div>
<div class="skel-text"></div>
</div>

</div>

<div class="footer">
<div>🛡️<br>Compra segura</div>
<div>⚡<br>Entrega rápida</div>
<div>⭐<br>Qualidade</div>
<div>🎧<br>Suporte</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://dbqleycdrkdhxrozsmup.supabase.co",
"sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

async function carregarContas(){
const { data } = await client.from("produtos").select("*").eq("destaque", true);

if(!data) return;

document.getElementById("contasBox").innerHTML = data.map(p=>`
<div class="produto">
<div class="badge">DESTAQUE</div>
<h4>${p.nome}</h4>
<img src="${p.imagem || '/default.png'}" onerror="this.src='/default.png'">
<div class="price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
<a class="buy" href="https://wa.me/${p.whatsapp}">COMPRAR</a>
</div>
`).join("");
}

carregarContas();
</script>

</body>
</html>
