<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* PARTICULAS */
#bgParticles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    pointer-events:none;
}

.bg-particle{
    position:absolute;
    border-radius:50%;
    background: radial-gradient(circle, #ff2a2a, transparent);
    opacity:0.25;
    animation: floatUp linear forwards;
}

@keyframes floatUp{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

/* layout */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:260px;
}

.admin-btn{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
}

.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:20px 0;
    background:#0a0a0f;
    color:#ff2a2a;
    border:1px solid rgba(255,0,0,0.3);
    border-radius:10px;
    text-decoration:none;
}

/* título */
.section{
    margin-top:30px;
}

.section h2{
    color:#ff2a2a;
    margin-bottom:10px;
}

/* SCROLL HORIZONTAL */
.scroll{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding-bottom:10px;
}

.scroll::-webkit-scrollbar{
    height:6px;
}

.scroll::-webkit-scrollbar-thumb{
    background:#ff2a2a;
    border-radius:10px;
}

/* CARD */
.card{
    min-width:240px;
    max-width:240px;
    background:#0a0a0f;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    position:relative;
    flex-shrink:0;
}

.card:hover{
    transform:scale(1.03);
}

/* destaque */
.destaque{
    border-color:#ff3c00;
    box-shadow:0 0 18px rgba(255,60,0,0.5);
}

/* badge */
.badge{
    position:absolute;
    top:8px;
    right:8px;
    padding:4px 8px;
    border-radius:6px;
    font-size:11px;
    background:#ff3c00;
    color:#000;
}

/* img */
img{
    width:100%;
    border-radius:10px;
    margin:8px 0;
}

/* preço */
.price{
    display:flex;
    align-items:center;
    gap:5px;
    color:#00ff88;
    font-weight:bold;
}

.price img{
    width:18px;
}

/* botão */
.buy-btn{
    display:block;
    margin-top:8px;
    padding:8px;
    text-align:center;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:8px;
    text-decoration:none;
}

.buy-btn:hover{
    background:#ff2a2a;
    color:#000;
}
</style>
</head>

<body>

<div id="bgParticles"></div>

<div class="container">

    <div class="header">
        <img src="InShot_20260415_234108748.png" class="logo">
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <a class="btn" href="catalogo">📦 CATÁLOGO</a>

    <!-- CONTAS -->
    <div id="contasSection" class="section" style="display:none;">
        <h2>🔥 CONTAS EM DESTAQUE</h2>
        <div id="contasBox" class="scroll"></div>
    </div>

    <!-- ITENS -->
    <div id="itensSection" class="section" style="display:none;">
        <h2>🔥 ITENS EM DESTAQUE</h2>
        <div id="itensBox" class="scroll"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* numero */
function formatarNumero(num){
    if(!num) return "5599999999999";
    num = num.replace(/\D/g,"");
    if(!num.startsWith("55")) num = "55"+num;
    return num;
}

/* partículas */
const bg = document.getElementById("bgParticles");

setInterval(()=>{
    const p = document.createElement("div");
    p.classList.add("bg-particle");

    let size = Math.random()*4 + 2;

    p.style.width = size+"px";
    p.style.height = size+"px";
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (6 + Math.random()*6)+"s";

    bg.appendChild(p);

    setTimeout(()=>p.remove(),12000);
}, 300);

/* render card */
function criarCard(item){
    const numero = formatarNumero(item.whatsapp);

    const link = `https://wa.me/${numero}?text=${encodeURIComponent("Olá! Quero comprar: " + item.nome)}`;

    return `
    <div class="card destaque">
        <div class="badge">DESTAQUE</div>

        <h4 style="color:#ff2a2a">${item.nome}</h4>

        ${item.imagem ? `<img src="${item.imagem}">` : ""}

        <p style="font-size:13px;">${item.descricao || ""}</p>

        <div class="price">
            <img src="/price.png">
            R$ ${parseFloat(item.preco || 0).toFixed(2)}
        </div>

        <a class="buy-btn" href="${link}" target="_blank">
            🛒 Comprar
        </a>
    </div>
    `;
}

/* carregar */
async function carregar(){

    const [itensRes, produtosRes] = await Promise.all([
        client.from("itens").select("*").eq("destaque", true),
        client.from("produtos").select("*").eq("destaque", true)
    ]);

    const itens = itensRes.data || [];
    const produtos = produtosRes.data || [];

    // CONTAS
    if(produtos.length > 0){
        document.getElementById("contasSection").style.display = "block";

        document.getElementById("contasBox").innerHTML =
            produtos.map(criarCard).join("");
    }

    // ITENS
    if(itens.length > 0){
        document.getElementById("itensSection").style.display = "block";

        document.getElementById("itensBox").innerHTML =
            itens.map(criarCard).join("");
    }
}

carregar();
</script>

</body>
</html>
