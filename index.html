<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* 🔥 glow fogo leve */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,80,0,0.10), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(0,255,255,0.06), transparent 60%);
    bottom:-200px;
    right:-200px;
    z-index:-2;
}

/* ⚪ partículas */
.particle{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    box-shadow:0 0 6px rgba(255,255,255,0.8);
    border-radius:50%;
    opacity:0.5;
    animation: fall linear infinite;
    z-index:-1;
}

@keyframes fall{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#00ffff;
    text-shadow:0 0 6px rgba(0,255,255,0.25);
    font-size:22px;
}

/* botões topo */
.admin-btn{
    padding:8px 14px;
    border:1px solid #00ffff;
    color:#00ffff;
    text-decoration:none;
    border-radius:10px;
    transition:0.2s;
}

.admin-btn:hover{
    background:#00ffff;
    color:#000;
}

.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:20px 0;
    background:#0a0a0f;
    color:#00ffff;
    border:1px solid rgba(0,255,255,0.25);
    border-radius:10px;
    text-decoration:none;
    transition:0.2s;
}

.btn:hover{
    border-color:#00ffff;
}

/* título */
h2{
    text-align:center;
    margin-top:25px;
    color:#ff4d00;
    text-shadow:0 0 6px rgba(255,80,0,0.3);
}

/* card */
.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
    border:1px solid rgba(255,80,0,0.2);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

/* botão comprar */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #00ff88;
    color:#00ff88;
    border-radius:10px;
    text-decoration:none;
    transition:0.2s;
}

.buy-btn:hover{
    background:#00ff88;
    color:#000;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>⚡ LOJA NEON</h1>
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <a class="btn" href="dashboard">📦 CATÁLOGO</a>

    <h2>🔥 OS MAIS PROCURADOS</h2>
    <div id="destaques"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://dbqleycdrkdhxrozsmup.supabase.co";
const supabaseAnonKey = "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis";

const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

/* partículas */
function createParticles(){
    for(let i=0;i<20;i++){
        let p = document.createElement("div");
        p.classList.add("particle");

        p.style.left = Math.random()*100 + "vw";
        p.style.animationDuration = (6 + Math.random()*6) + "s";
        p.style.opacity = Math.random()*0.5 + 0.2;

        document.body.appendChild(p);
    }
}
createParticles();

async function carregarDestaques(){

    const { data, error } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");
    box.innerHTML = "";

    if(!data || error){
        box.innerHTML = "<p>Erro ao carregar</p>";
        return;
    }

    if(data.length === 0){
        box.innerHTML = "<p>Nenhum destaque ainda</p>";
        return;
    }

    data.forEach(item => {

        const whatsappLink = item.whatsapp
            ? `https://wa.me/${item.whatsapp}?text=${encodeURIComponent("Olá! Tenho interesse no produto: " + item.nome)}`
            : null;

        box.innerHTML += `
            <div class="card">
                <h3 style="color:#00ffff">${item.nome}</h3>

                ${item.imagem ? `<img src="${item.imagem}">` : ""}

                <p>${item.descricao}</p>

                <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>

                ${whatsappLink ? `
                    <a class="buy-btn" href="${whatsappLink}" target="_blank">
                        🛒 Comprar
                    </a>
                ` : ""}
            </div>
        `;
    });
}

carregarDestaques();
</script>

</body>
    </html>
