<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definya Market</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-left: 10px;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h2>🛒 Definya Market</h2>
  <div>
    <button onclick="location.href='/dashboard'">Anunciar</button>
    <button onclick="location.href='/admin'">Admin</button>
  </div>
</header>

<div class="container">

  <div class="card">
    <h3>⚔️ Espada Lendária</h3>
    <p>Dano alto + item raro</p>
    <strong>R$ 50</strong>
  </div>

  <div class="card">
    <h3>💰 1kk Gold</h3>
    <p>Entrega rápida</p>
    <strong>R$ 20</strong>
  </div>

</div>

</body>
</html>
