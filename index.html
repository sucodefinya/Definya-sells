<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definya Sells</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:#fff;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:240px;
    filter: drop-shadow(0 0 12px rgba(255,0,0,0.6));
}

.admin-btn{
    padding:10px 16px;
    border-radius:12px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    text-decoration:none;
}

/* CARD BASE */
.card{
    background: linear-gradient(145deg,#0a0a0f,#050505);
    border-radius:16px;
    padding:15px;
    border:1px solid rgba(255,255,255,0.06);
    margin-bottom:15px;
}

/* BANNER */
.banner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #00ffff;
    border-radius:16px;
    padding:15px;
    background:#081010;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
}

.banner img{
    width:100px;
}

/* TITULO */
.section-title{
    margin:25px 0 10px;
    font-size:20px;
}

.section-title span{
    color:#ff2a2a;
}

/* SCROLL */
.scroll{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

/* PRODUTO */
.produto{
    min-width:250px;
    background: linear-gradient(145deg,#0a0a0f,#050505);
    border-radius:16px;
    padding:12px;
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 0 15px rgba(255,0,0,0.15);
    transition:0.3s;
}

.produto:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(255,0,0,0.35);
}

.produto img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:12px;
}

.badge{
    position:absolute;
    background:#ff2a2a;
    padding:5px 10px;
    border-radius:8px;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

.buy{
    display:block;
    text-align:center;
    margin-top:10px;
    padding:10px;
    background:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
    color:#fff;
}

/* FOOTER */
.footer{
    display:flex;
    justify-content:space-around;
    margin-top:30px;
    border-top:1px solid rgba(255,255,255,0.1);
    padding:15px;
    font-size:12px;
}

/* SKELETON */
.skeleton{
    position:relative;
    overflow:hidden;
    border-radius:16px;
    background: linear-gradient(145deg,#0b0b10,#060606);
}

.skeleton::after{
    content:"";
    position:absolute;
    top:0;
    left:-150%;
    width:120%;
    height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    animation: shimmer 1.6s infinite;
}

@keyframes shimmer{
    100%{ left:150%; }
}

.skel-img{
    width:100%;
    height:140px;
    background:#111;
    border-radius:12px;
    margin-bottom:10px;
}

.skel-title{
    height:14px;
    width:70%;
    background:#111;
    border-radius:6px;
    margin-bottom:8px;
}

.skel-price{
    height:12px;
    width:40%;
    background:#111;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="/logo.png" class="logo" onerror="this.src='https://via.placeholder.com/200x60'">
<a class="admin-btn">Admin</a>
</div>

<div class="card">📦 CATÁLOGO</div>

<div class="banner">
<div>
<b>💸 PAGUE MAIS BARATO</b><br>
Use Coins Hub
</div>
<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
</div>

<div class="section-title">🔥 CONTAS <span>EM DESTAQUE</span></div>

<div id="contasBox" class="scroll">

<!-- skeleton -->
<div class="produto skeleton">
<div class="skel-img"></div>
<div class="skel-title"></div>
<div class="skel-price"></div>
</div>

<div class="produto skeleton">
<div class="skel-img"></div>
<div class="skel-title"></div>
<div class="skel-price"></div>
</div>

<div class="produto skeleton">
<div class="skel-img"></div>
<div class="skel-title"></div>
<div class="skel-price"></div>
</div>

</div>

<div class="footer">
<div>🛡️ Compra segura</div>
<div>⚡ Entrega rápida</div>
<div>⭐ Qualidade</div>
<div>🎧 Suporte</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://dbqleycdrkdhxrozsmup.supabase.co",
"sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

async function carregarContas(){
const { data } = await client.from("produtos").select("*").eq("destaque", true);

if(!data) return;

const box = document.getElementById("contasBox");
box.style.opacity = "0";

box.innerHTML = data.map(p=>`
<div class="produto">
<h4>${p.nome}</h4>
<img src="${p.imagem || '/default.png'}" onerror="this.src='/default.png'">
<div class="price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
<a class="buy" href="https://wa.me/${p.whatsapp}">COMPRAR</a>
</div>
`).join("");

setTimeout(()=>{
    box.style.transition="0.4s";
    box.style.opacity="1";
},100);
}

carregarContas();
</script>

</body>
</html>
