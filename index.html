<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* 🔥 SPLASH */
#splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    overflow:hidden;
}

/* container da logo */
.splash-center{
    position:relative;
}

/* logo */
#splash img{
    width:320px;
    z-index:2;
    position:relative;
}

/* 🔴 partículas livres */
.red-particle{
    position:absolute;
    width:4px;
    height:4px;
    background:#ff2a2a;
    border-radius:50%;
    pointer-events:none;
    animation:explode 0.8s linear forwards;
}

@keyframes explode{
    from{
        transform:translate(0,0);
        opacity:1;
    }
    to{
        transform:translate(var(--x), var(--y));
        opacity:0;
    }
}

/* 🔄 loading neon */
.loading-bar{
    width:220px;
    height:4px;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
}

.loading-fill{
    height:100%;
    width:0%;
    background:#ff2a2a;
    box-shadow:0 0 10px #ff2a2a, 0 0 20px #ff0000;
    transition:width 0.2s;
}

.loading-text{
    margin-top:8px;
    font-size:14px;
    color:#ff2a2a;
}

/* fundo glow */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,50,0,0.15), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,0,0,0.08), transparent 60%);
    bottom:-200px;
    right:-200px;
    z-index:-2;
}

/* partículas fundo */
.particle{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.5;
    animation: fall linear infinite;
    z-index:-1;
}

@keyframes fall{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:260px;
}

/* botões */
.admin-btn{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    text-decoration:none;
    border-radius:10px;
}

.admin-btn:hover{
    background:#ff2a2a;
    color:#000;
}

.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:20px 0;
    background:#0a0a0f;
    color:#ff2a2a;
    border:1px solid rgba(255,0,0,0.3);
    border-radius:10px;
    text-decoration:none;
}

h2{
    text-align:center;
    margin-top:25px;
    color:#ff2a2a;
}

.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
}

.card:hover{
    transform:translateY(-4px);
    border:1px solid rgba(255,0,0,0.4);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

/* 🔴 botão comprar neon */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
    box-shadow:0 0 10px #ff2a2a;
}

.buy-btn:hover{
    background:#ff2a2a;
    color:#000;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <div class="splash-center" id="center">
        <img src="InShot_20260415_234327721.png">
    </div>

    <div class="loading-bar">
        <div class="loading-fill" id="fill"></div>
    </div>

    <div class="loading-text" id="text">0%</div>
</div>

<div class="container">

    <div class="header">
        <img src="InShot_20260415_234108748.png" class="logo">
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <a class="btn" href="catalogo">📦 CATÁLOGO</a>

    <h2>🔥 OS MAIS PROCURADOS</h2>
    <div id="destaques"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* partículas fundo */
for(let i=0;i<20;i++){
    let p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (6+Math.random()*6)+"s";
    document.body.appendChild(p);
}

/* 🔴 partículas corretas (posição real da logo) */
function spawnParticle(){
    const img = document.querySelector("#center img");
    const rect = img.getBoundingClientRect();

    let p = document.createElement("div");
    p.classList.add("red-particle");

    p.style.left = rect.left + rect.width/2 + "px";
    p.style.top = rect.top + rect.height/2 + "px";

    let x = (Math.random()*200 - 100) + "px";
    let y = (Math.random()*200 - 100) + "px";

    p.style.setProperty('--x', x);
    p.style.setProperty('--y', y);

    document.body.appendChild(p);

    setTimeout(()=>p.remove(),800);
}

setInterval(spawnParticle,80);

/* 🔄 loading real */
let progress = 0;
const fill = document.getElementById("fill");
const text = document.getElementById("text");
const splash = document.getElementById("splash");

const loading = setInterval(()=>{
    progress += Math.random()*12;

    if(progress >= 100){
        progress = 100;
        clearInterval(loading);

        setTimeout(()=>{
            splash.style.transition = "opacity 0.6s";
            splash.style.opacity = "0";

            setTimeout(()=> splash.remove(),600);
        },300);
    }

    fill.style.width = progress + "%";
    text.innerText = Math.floor(progress) + "%";
},120);

/* produtos */
async function carregarDestaques(){
    const { data } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");

    if(!data){
        box.innerHTML = "<p>Erro</p>";
        return;
    }

    box.innerHTML = data.map(item=>`
        <div class="card">
            <h3 style="color:#ff2a2a">${item.nome}</h3>
            ${item.imagem ? `<img src="${item.imagem}">` : ""}
            <p>${item.descricao}</p>
            <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>
            <a class="buy-btn" href="https://wa.me/${item.whatsapp}" target="_blank">🛒 Comprar</a>
        </div>
    `).join("");
}

carregarDestaques();
</script>

</body>
</html>
