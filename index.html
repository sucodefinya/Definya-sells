<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* 🔥 SPLASH */
#splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    overflow:hidden;
    animation:fadeOut 1s ease forwards;
    animation-delay:2.5s;
}

/* imagem acima das partículas */
#splash img{
    width:320px;
    z-index:2;
    animation:zoom 1.2s ease;
}

/* 🔴 partículas atrás */
.red-particle{
    position:absolute;
    width:3px;
    height:3px;
    background:#ff2a2a;
    border-radius:50%;
    opacity:0.7;
    animation:rise linear infinite;
    z-index:1;
}

@keyframes rise{
    from{ transform:translateY(100vh); opacity:0; }
    20%{ opacity:1; }
    to{ transform:translateY(-10vh); opacity:0; }
}

/* 🔄 loading bar */
.loading-bar{
    width:200px;
    height:4px;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
    z-index:2;
}

.loading-fill{
    height:100%;
    width:0%;
    background:#fff;
    animation:load 2s linear forwards;
}

@keyframes load{
    to{ width:100%; }
}

@keyframes zoom{
    from{ transform:scale(0.9); opacity:0; }
    to{ transform:scale(1); opacity:1; }
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* fundo glow */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,50,0,0.15), transparent 60%);
    top:-200px;
    left:-200px;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,0,0,0.08), transparent 60%);
    bottom:-200px;
    right:-200px;
    z-index:-2;
}

/* partículas fundo */
.particle{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    box-shadow:0 0 6px rgba(255,255,255,0.8);
    border-radius:50%;
    opacity:0.5;
    animation: fall linear infinite;
    z-index:-1;
}

@keyframes fall{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:260px;
}

/* botão admin */
.admin-btn{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    text-decoration:none;
    border-radius:10px;
}

.admin-btn:hover{
    background:#ff2a2a;
    color:#000;
}

/* botão catálogo */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:20px 0;
    background:#0a0a0f;
    color:#ff2a2a;
    border:1px solid rgba(255,0,0,0.3);
    border-radius:10px;
    text-decoration:none;
}

.btn:hover{
    border-color:#ff2a2a;
}

/* título */
h2{
    text-align:center;
    margin-top:25px;
    color:#ff2a2a;
}

/* card */
.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
}

.card:hover{
    transform:translateY(-4px);
    border:1px solid rgba(255,0,0,0.4);
}

img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

/* 🟡 BOTÃO COMPRAR NEON BRANCO */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #fff;
    color:#fff;
    border-radius:10px;
    text-decoration:none;
    box-shadow:0 0 8px rgba(255,255,255,0.4);
}

.buy-btn:hover{
    background:#fff;
    color:#000;
}
</style>
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
    <img src="InShot_20260415_234327721.png">

    <div class="loading-bar">
        <div class="loading-fill"></div>
    </div>
</div>

<div class="container">

    <div class="header">
        <img src="InShot_20260415_234108748.png" class="logo">
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <a class="btn" href="catalogo">📦 CATÁLOGO</a>

    <h2>🔥 OS MAIS PROCURADOS</h2>
    <div id="destaques"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* partículas fundo */
function createParticles(){
    for(let i=0;i<20;i++){
        let p = document.createElement("div");
        p.classList.add("particle");

        p.style.left = Math.random()*100 + "vw";
        p.style.animationDuration = (6 + Math.random()*6) + "s";

        document.body.appendChild(p);
    }
}
createParticles();

/* 🔴 partículas splash ATRÁS da imagem */
function splashParticles(){
    const splash = document.getElementById("splash");

    for(let i=0;i<40;i++){
        let p = document.createElement("div");
        p.classList.add("red-particle");

        p.style.left = Math.random()*100 + "vw";
        p.style.animationDuration = (2 + Math.random()*2) + "s";

        splash.appendChild(p);
    }
}
splashParticles();

/* carregar produtos */
async function carregarDestaques(){
    const { data } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");
    box.innerHTML = "";

    if(!data || data.length === 0){
        box.innerHTML = "<p>Nenhum destaque ainda</p>";
        return;
    }

    data.forEach(item => {

        const link = item.whatsapp
            ? `https://wa.me/${item.whatsapp}?text=${encodeURIComponent("Quero: " + item.nome)}`
            : "#";

        box.innerHTML += `
            <div class="card">
                <h3 style="color:#ff2a2a">${item.nome}</h3>

                ${item.imagem ? `<img src="${item.imagem}">` : ""}

                <p>${item.descricao}</p>

                <div class="price">💰 R$ ${parseFloat(item.preco).toFixed(2)}</div>

                <a class="buy-btn" href="${link}" target="_blank">
                    🛒 Comprar
                </a>
            </div>
        `;
    });
}

carregarDestaques();
</script>

</body>
</html>
