<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* 🔴 FUNDO ANIMADO */
.particle{
    position:fixed;
    width:2px;
    height:2px;
    background:#ff2a2a;
    border-radius:50%;
    opacity:0.4;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

/* SPLASH */
#splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

/* loading */
.loading-bar{
    width:220px;
    height:4px;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
}

.loading-fill{
    height:100%;
    width:0%;
    background:#ff2a2a;
    box-shadow:0 0 10px #ff2a2a,0 0 20px #ff0000;
}

.loading-text{
    margin-top:8px;
    color:#ff2a2a;
}

/* layout */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:260px;
}

/* botão */
.admin-btn{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
}

.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin:20px 0;
    background:#0a0a0f;
    color:#ff2a2a;
    border:1px solid rgba(255,0,0,0.3);
    border-radius:10px;
    text-decoration:none;
}

/* título */
h2{
    text-align:center;
    margin-top:25px;
    color:#ff2a2a;
}

/* CARD */
.card{
    background:#0a0a0f;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    position:relative;

    opacity:0;
    transform:translateY(40px);
    transition:0.6s;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    transform:translateY(-5px) scale(1.02);
}

/* 🔥 DESTAQUE */
.destaque{
    border-color:#ff3c00;
    animation: glowPulse 2s infinite;
}

@keyframes glowPulse{
    0%{ box-shadow:0 0 10px rgba(255,60,0,0.4); }
    50%{ box-shadow:0 0 25px rgba(255,120,0,0.8); }
    100%{ box-shadow:0 0 10px rgba(255,60,0,0.4); }
}

.badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:4px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:bold;
}

.destaque .badge{
    background:linear-gradient(45deg,#ff2a2a,#ff7a00);
    box-shadow:0 0 10px #ff3c00;
    animation: pulse 1.5s infinite;
}

@keyframes pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.1); }
    100%{ transform:scale(1); }
}

img{
    width:100%;
    border-radius:10px;
}

/* preço */
.price{
    display:flex;
    align-items:center;
    gap:6px;
    color:#00ff88;
    font-weight:bold;
}

.price img{
    width:22px;
}

/* botão comprar */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
    box-shadow:0 0 10px rgba(255,0,0,0.4);
}

.buy-btn:hover{
    background:#ff2a2a;
    color:#000;
    box-shadow:0 0 20px #ff2a2a;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="InShot_20260415_234327721.png" width="300">

    <div class="loading-bar">
        <div class="loading-fill" id="fill"></div>
    </div>

    <div class="loading-text" id="text">0%</div>
</div>

<div class="container">

    <div class="header">
        <img src="InShot_20260415_234108748.png" class="logo">
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <a class="btn" href="catalogo">📦 CATÁLOGO</a>

    <h2>🔥 MAIS PROCURADOS</h2>
    <div id="destaques"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* partículas fundo */
setInterval(()=>{
    const p = document.createElement("div");
    p.classList.add("particle");

    let size = Math.random()*3+1;
    p.style.width = size+"px";
    p.style.height = size+"px";
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (5+Math.random()*5)+"s";

    document.body.appendChild(p);
    setTimeout(()=>p.remove(),10000);
},200);

/* formatar numero */
function formatarNumero(num){
    if(!num) return "5599999999999";
    num = num.replace(/\D/g,"");
    if(!num.startsWith("55")) num = "55"+num;
    return num;
}

/* loading */
let progress = 0;
const fill = document.getElementById("fill");
const text = document.getElementById("text");
const splash = document.getElementById("splash");

const loading = setInterval(()=>{
    progress += Math.random()*10;

    if(progress >= 100){
        progress = 100;
        clearInterval(loading);

        setTimeout(()=>{
            splash.style.opacity="0";
            splash.style.transition="0.5s";
            setTimeout(()=>splash.remove(),500);
        },300);
    }

    fill.style.width = progress+"%";
    text.innerText = Math.floor(progress)+"%";
},120);

/* observer animação */
function animar(){
    const cards = document.querySelectorAll(".card");

    const obs = new IntersectionObserver(entries=>{
        entries.forEach(e=>{
            if(e.isIntersecting){
                e.target.classList.add("show");
            }
        });
    });

    cards.forEach(c=>obs.observe(c));
}

/* carregar */
async function carregar(){

    const { data } = await client
        .from("produtos")
        .select("*")
        .eq("destaque", true)
        .limit(3);

    const box = document.getElementById("destaques");

    box.innerHTML = data.map(item=>{

        const numero = formatarNumero(item.whatsapp);

        return `
        <div class="card destaque">
            <div class="badge">DESTAQUE</div>

            <h3 style="color:#ff2a2a">${item.nome}</h3>

            ${item.imagem ? `<img src="${item.imagem}">` : ""}

            <p>${item.descricao}</p>

            <div class="price">
                <img src="/price.png">
                R$ ${parseFloat(item.preco).toFixed(2)}
            </div>

            <a class="buy-btn" href="https://wa.me/${numero}" target="_blank">
                🛒 Comprar
            </a>
        </div>
        `;
    }).join("");

    animar();
}

carregar();
</script>

</body>
</html>
