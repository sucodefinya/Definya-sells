<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definya Sells</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#050505;
    color:#fff;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    width:220px;
    filter: drop-shadow(0 0 15px #ff2a2a);
}

.admin-btn{
    padding:10px 16px;
    border-radius:12px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    text-decoration:none;
}

/* CARD BASE */
.card{
    background:linear-gradient(145deg,#0a0a0f,#060606);
    border-radius:16px;
    padding:15px;
    position:relative;
    margin-bottom:15px;
}

/* BORDA NEON */
.card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:16px;
    padding:1px;
    background:linear-gradient(90deg,#ff2a2a,#00ffff);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
}

/* CATÁLOGO */
.catalogo{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* YOUTUBE */
.youtube{
    display:flex;
    gap:12px;
    align-items:center;
}

.youtube-icon{
    width:45px;
    height:45px;
    background:#ff0000;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* BANNER */
.banner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:16px;
    padding:15px;
    background:linear-gradient(145deg,#061111,#020202);
    border:1px solid #00ffff;
    box-shadow:0 0 25px rgba(0,255,255,0.3);
}

.banner img{
    width:110px;
}

/* TITULO */
.section-title{
    margin:25px 0 10px;
    font-size:18px;
}

.section-title span{
    color:#ff2a2a;
}

/* SCROLL */
.scroll{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

/* PRODUTO */
.produto{
    min-width:240px;
    border-radius:16px;
    padding:12px;
    background:linear-gradient(145deg,#0a0a0f,#050505);
    position:relative;
    transition:.3s;
}

.produto::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:16px;
    padding:1px;
    background:linear-gradient(90deg,#ff2a2a,#00ffff);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
}

.produto:hover{
    transform:translateY(-5px);
}

.produto img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:12px;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

.buy{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border-radius:10px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    text-decoration:none;
}

/* FOOTER */
.footer{
    display:flex;
    justify-content:space-around;
    margin-top:30px;
    padding-top:15px;
    border-top:1px solid rgba(255,255,255,0.1);
    font-size:12px;
}

/* SKELETON */
.skeleton{
    position:relative;
    overflow:hidden;
    background:#0a0a0f;
    border-radius:16px;
}

.skeleton::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
    animation:load 1.4s infinite;
}

@keyframes load{
    100%{left:100%}
}

.skel-img{height:140px;background:#111;border-radius:12px;}
.skel-text{height:12px;background:#111;margin-top:8px;border-radius:6px;}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="/logo.png" class="logo" onerror="this.src='https://via.placeholder.com/200x60'">
<a href="admin/loginadm/" class="admin-btn">Admin</a>
</div>

<div class="card catalogo">
<div>
<b>📦 CATÁLOGO</b><br>
<small>Confira nossos produtos</small>
</div>
➜
</div>

<div id="linksBox"></div>

<div class="banner">
<div>
<b>💸 PAGUE MAIS BARATO</b><br>
Coins Hub
</div>
<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
</div>

<div class="section-title">🔥 CONTAS <span>EM DESTAQUE</span></div>

<div id="contasBox" class="scroll">

<div class="produto skeleton">
<div class="skel-img"></div>
<div class="skel-text"></div>
<div class="skel-text"></div>
</div>

<div class="produto skeleton">
<div class="skel-img"></div>
<div class="skel-text"></div>
<div class="skel-text"></div>
</div>

</div>

<div class="footer">
<div>🛡️ Compra segura</div>
<div>⚡ Entrega rápida</div>
<div>⭐ Qualidade</div>
<div>🎧 Suporte</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://dbqleycdrkdhxrozsmup.supabase.co",
"sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* LINKS */
async function carregarLinks(){
const { data } = await client.from("links").select("*");
if(!data) return;

let html = "";

data.forEach(l=>{
if(l.tipo==="youtube"){
html += `
<div class="card youtube">
<div class="youtube-icon">▶</div>
<div><b>YouTube</b><br><small>Acessar canal</small></div>
</div>`;
}

if(l.tipo==="coinhub"){
html += `
<div class="card">
💸 COMPRE MAIS BARATO<br><br>
<a href="${l.url}" target="_blank">ENTRAR</a>
</div>`;
}
});

document.getElementById("linksBox").innerHTML = html;
}

/* CONTAS */
async function carregarContas(){
const { data } = await client.from("produtos").select("*").eq("destaque",true);
if(!data) return;

document.getElementById("contasBox").innerHTML = data.map(p=>`
<div class="produto">
<h4>${p.nome}</h4>
<img src="${p.imagem || '/default.png'}" onerror="this.src='/default.png'">
<div class="price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
<a class="buy" href="https://wa.me/${p.whatsapp}">COMPRAR</a>
</div>
`).join("");
}

carregarLinks();
carregarContas();
</script>

</body>
</html>
