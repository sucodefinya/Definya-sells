<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Neon</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
}

/* container */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:260px;
}

/* botões */
.admin-btn{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
}

/* 🔗 LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin:20px 0;
}

/* 🔴 YOUTUBE BONITO */
.youtube-card{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:12px;
    background:#0a0a0f;
    border:1px solid rgba(255,0,0,0.3);
    text-decoration:none;
    color:#fff;
}

.youtube-icon{
    width:40px;
    height:40px;
    background:red;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
}

/* 💰 COINHUB CARD */
.coinhub-card{
    padding:15px;
    border-radius:12px;
    background:#0a0a0f;
    border:1px solid #00ffff;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.coinhub-title{
    font-weight:bold;
    margin-bottom:5px;
    color:#00ffff;
}

.coinhub-sub{
    font-size:14px;
    margin-bottom:10px;
}

/* botão */
.link-btn{
    display:inline-block;
    padding:10px 14px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    border:1px solid #00ffff;
    color:#00ffff;
}

.link-btn:hover{
    background:#00ffff;
    color:#000;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="InShot_20260415_234108748.png" class="logo">
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <div id="linksBox"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* LINKS BONITOS */
async function carregarLinks(){
    const { data } = await client.from("links").select("*");

    if(!data || data.length === 0) return;

    let html = `<div class="links">`;

    data.forEach(l=>{

        /* YOUTUBE */
        if(l.tipo === "youtube"){
            html += `
                <a href="${l.url}" target="_blank" class="youtube-card">
                    <div class="youtube-icon">▶</div>
                    <div>
                        <div style="font-weight:bold;">YouTube</div>
                        <div style="font-size:13px; opacity:0.7;">Acessar canal</div>
                    </div>
                </a>
            `;
        }

        /* COINHUB */
        if(l.tipo === "coinhub"){
            html += `
                <div class="coinhub-card">
                    <div class="coinhub-title">
                        💸 QUER PAGAR BARATO?
                    </div>

                    <div class="coinhub-sub">
                        COMPRE PELA COINS HUB
                    </div>

                    <a href="${l.url}" target="_blank" class="link-btn">
                         ENTRAR
                    </a>
                </div>
            `;
        }

    });

    html += `</div>`;

    document.getElementById("linksBox").innerHTML = html;
}

carregarLinks();
</script>

</body>
</html>
