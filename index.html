<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definya Sells</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e5e7eb;
}

/* partículas */
#bgParticles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.bg-particle{
    position:absolute;
    border-radius:50%;
    background: radial-gradient(circle, #ff2a2a, transparent);
    opacity:0.25;
    animation: floatUp linear forwards;
}

@keyframes floatUp{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    max-width:200px;
    filter: drop-shadow(0 0 10px red);
}

.admin-btn{
    padding:8px 14px;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    border-radius:10px;
    text-decoration:none;
}

/* BOTÃO */
.btn{
    display:block;
    text-align:center;
    padding:14px;
    margin:20px 0;
    background:#0a0a0f;
    color:#ff2a2a;
    border:1px solid rgba(255,0,0,0.3);
    border-radius:12px;
    text-decoration:none;
}

/* LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.youtube-card{
    display:flex;
    gap:12px;
    padding:12px;
    border-radius:12px;
    background:#0a0a0f;
    border:1px solid rgba(255,0,0,0.3);
    text-decoration:none;
    color:#fff;
}

.youtube-icon{
    width:40px;
    height:40px;
    background:red;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.coinhub-card{
    padding:15px;
    border-radius:12px;
    border:1px solid #00ffff;
    box-shadow:0 0 20px rgba(0,255,255,0.4);
}

.link-btn{
    display:inline-block;
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #00ffff;
    color:#00ffff;
    text-decoration:none;
}

/* SECTION */
.section{
    margin-top:30px;
}

.red{
    color:#ff2a2a;
}

/* SCROLL */
.scroll{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

/* CARD */
.card{
    min-width:240px;
    padding:15px;
    border-radius:12px;
    background:#0a0a0f;
    border:1px solid rgba(255,0,0,0.2);
    position:relative;
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:10px;
}

/* BADGE */
.badge{
    position:absolute;
    top:10px;
    right:10px;
    background:#ff2a2a;
    color:#fff;
    padding:4px 8px;
    border-radius:6px;
}

/* PREÇO */
.price{
    color:#00ff88;
    font-weight:bold;
}

/* BOTÃO */
.buy-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    background:#ff2a2a;
    color:#fff;
    border-radius:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<div id="bgParticles"></div>

<div class="container">

    <div class="header">
        <img src="https://via.placeholder.com/200x60?text=LOGO" class="logo">
        <a class="admin-btn" href="admin/loginadm/">Admin</a>
    </div>

    <a class="btn" href="catalogo">📦 CATÁLOGO</a>

    <div id="linksBox"></div>

    <div id="contasSection" class="section" style="display:none;">
        <h2>🔥 CONTAS <span class="red">EM DESTAQUE</span></h2>
        <div id="contasBox" class="scroll"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://dbqleycdrkdhxrozsmup.supabase.co",
  "sb_publishable_FWn_AbD03PebLf2NLt5CZQ_iFkM7fis"
);

/* partículas */
setInterval(()=>{
    const p = document.createElement("div");
    p.classList.add("bg-particle");
    p.style.width = (Math.random()*4+2)+"px";
    p.style.height = p.style.width;
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (6+Math.random()*6)+"s";
    document.getElementById("bgParticles").appendChild(p);
    setTimeout(()=>p.remove(),12000);
},300);

/* LINKS */
async function carregarLinks(){
    const { data } = await client.from("links").select("*");
    if(!data) return;

    let html = `<div class="links">`;

    data.forEach(l=>{
        if(l.tipo === "youtube"){
            html += `
            <a href="${l.url}" target="_blank" class="youtube-card">
                <div class="youtube-icon">▶</div>
                <div><b>YouTube</b><br><small>Acessar canal</small></div>
            </a>`;
        }

        if(l.tipo === "coinhub"){
            html += `
            <div class="coinhub-card">
                💸 COMPRE MAIS BARATO<br><br>
                <a href="${l.url}" target="_blank" class="link-btn">ENTRAR</a>
            </div>`;
        }
    });

    html += `</div>`;
    document.getElementById("linksBox").innerHTML = html;
}

/* CONTAS */
async function carregarContas(){
    const { data } = await client.from("produtos").select("*").eq("destaque", true);

    if(!data || data.length === 0) return;

    document.getElementById("contasSection").style.display = "block";

    document.getElementById("contasBox").innerHTML = data.map(p=>`
        <div class="card">
            <div class="badge">DESTAQUE</div>
            <h4>${p.nome}</h4>
            <img src="${p.imagem || "https://via.placeholder.com/300"}">
            <p>${p.descricao || ""}</p>
            <div class="price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
            <a class="buy-btn" href="https://wa.me/${p.whatsapp}">
                COMPRAR
            </a>
        </div>
    `).join("");
}

/* INIT */
carregarLinks();
carregarContas();
</script>

</body>
</html>
